<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전표 통합 관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0ede8;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --radius: 8px; --radius-lg: 12px;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
  --red: #C62828; --red-bg: #FFEBEE;
  --green: #2E7D32; --green-bg: #E8F5E9;
  --orange: #E65100; --orange-bg: #FFF3E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh}
.layout{display:flex;min-height:100vh}

/* 사이드바 */
.sidebar{width:220px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 16px 16px;border-bottom:0.5px solid var(--border)}
.sidebar-logo-title{font-size:14px;font-weight:600;line-height:1.4}
.sidebar-logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:4px 8px;margin-top:12px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;background:#FF9800;color:#fff;padding:1px 6px;border-radius:10px}
.sidebar-bottom{padding:12px 8px;border-top:0.5px solid var(--border)}
.mgmt-status{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer}
.mgmt-status.locked{background:var(--bg2);color:var(--text2)}
.mgmt-status.unlocked{background:var(--orange-bg);color:var(--orange)}

/* 메인 */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:24px;flex:1}

/* 공통 컴포넌트 */
.btn{padding:7px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);transition:background .15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--red);color:#fff;border-color:transparent}
.btn-danger:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff;border-color:transparent}
.btn-orange:hover{opacity:.85}
input,select,textarea{font-size:13px;font-family:inherit;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;color:var(--text);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:64px}
label.field-label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.full{grid-column:1/-1}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sn{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:20px;font-weight:600}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.b-card{background:#E3F2FD;color:#0D47A1}.b-buy{background:#FFF3E0;color:#BF360C}
.b-none{background:#FFEBEE;color:#C62828}
.b-ok{background:#E8F5E9;color:#1B5E20}

/* 채널 뱃지 */
.ch-ALI{background:#FCE4EC;color:#880E4F}
.ch-아마존{background:#E8F5E9;color:#1B5E20}
.ch-중{background:#FFF8E1;color:#E65100}
.ch-라자다{background:#E3F2FD;color:#0D47A1}
.ch-라쿠텐{background:#F3E5F5;color:#4A148C}
.ch-쇼피{background:#FFCCBC;color:#BF360C}
.ch-큐텐{background:#E0F7FA;color:#006064}
.ch-월마트{background:#E8EAF6;color:#1A237E}
.ch-네이버{background:#E8F5E9;color:#2E7D32}
.ch-쿠팡{background:#FFF3E0;color:#BF360C}
.ch-카페24{background:#F3E5F5;color:#6A1B9A}
.ch-쇼피파이J{background:#E0F2F1;color:#004D40}
.ch-쇼피파이G{background:#FBE9E7;color:#C62828}
.ch-엘지유플러스{background:#E8EAF6;color:#283593}
.ch-광업{background:#EFEBE9;color:#3E2723}
.ch-일반도매{background:#F1F8E9;color:#33691E}
.ch-공통{background:#F5F5F5;color:#424242}

/* 테이블 */
.table-wrap{overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--radius-lg)}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--bg)}
th{font-size:11px;font-weight:500;color:var(--text2);text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap;background:var(--bg2)}
td{padding:7px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.no-ch td{background:rgba(255,152,0,0.04)}

/* 필터 */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{width:auto;min-width:100px;font-size:12px;padding:6px 9px}

/* 업로드 존 */
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:2rem;text-align:center;cursor:pointer;transition:background .15s}
.upload-zone:hover,.upload-zone.drag{background:var(--bg2)}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 20px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px 20px;display:flex;gap:8px;justify-content:flex-end}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:4px}

/* 증빙 파일 */
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px}
.file-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:600}
.file-icon.pdf{background:#FFEBEE;color:#C62828}
.file-icon.img{background:#E8F5E9;color:#2E7D32}
.file-icon.etc{background:#E3F2FD;color:#0D47A1}
.file-info{flex:1;min-width:0}
.file-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:11px;color:var(--text3)}

/* 날짜 범위 */
.date-range{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius-lg);border:0.5px solid var(--border);margin-bottom:10px}
.date-range input[type=date]{width:auto;min-width:150px}
.date-sep{color:var(--text3);font-size:13px}
.quick-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.quick-btn{padding:3px 10px;font-size:11px;border-radius:6px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2)}
.quick-btn:hover{background:var(--text);color:var(--bg);border-color:transparent}

/* 알림 토스트 */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:#1B5E20;color:#fff}
.toast.error{background:#B71C1C;color:#fff}
.toast.info{background:#0D47A1;color:#fff}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text3);gap:8px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:3rem;color:var(--text3);font-size:13px}

/* 진행바 */
.prog-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--text);border-radius:2px;transition:width .3s}

/* 채널 분석 */
.seg-bar{display:flex;border-radius:var(--radius);overflow:hidden;height:28px;margin-bottom:14px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.ch-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .grid2,.grid3,.grid4,.metric-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="layout">
  <!-- 사이드바 -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">전표 통합 관리</div>
      <div class="sidebar-logo-sub">카드 + 매입 · 16채널</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">데이터</div>
      <button class="nav-item active" onclick="goPage('upload')" id="nav-upload">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v9M7.5 1L4 4.5M7.5 1L11 4.5M2 12h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        팀별 업로드
      </button>
      <button class="nav-item" onclick="goPage('list')" id="nav-list">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 6h7M4 9h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        전표 조회
        <span class="nav-badge" id="pending-badge" style="display:none">!</span>
      </button>
      <div class="nav-section">분석</div>
      <button class="nav-item" onclick="goPage('channel')" id="nav-channel">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 1.5v6l4 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        채널별 분석
      </button>
      <button class="nav-item" onclick="goPage('summary')" id="nav-summary">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1 13V6l4-4 4 4 4-4v11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        기간별 요약
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="mgmt-status locked" id="mgmt-status-btn" onclick="handleMgmtClick()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="6" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 6V4a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="mgmt-status-txt">경영지원팀 로그인</span>
      </div>
    </div>
  </nav>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="page-title">팀별 업로드</div>
        <div class="topbar-sub" id="page-sub">엑셀 양식으로 전표를 업로드하세요</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-sm" onclick="exportCSV()">CSV 내보내기</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- 모달들 -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// 설정 — Supabase 연결 정보 (여기만 수정)
// ══════════════════════════════════════════════
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const MGMT_PW = 'mgmt2026';
const STORAGE_BUCKET = 'voucher-files';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════
const CHANNELS = ['ALI','아마존','중','라자다','라쿠텐','쇼피','큐텐','월마트','네이버','쿠팡','카페24','쇼피파이(J)','쇼피파이(G)','엘지유플러스','광업','일반도매','공통'];
const TEAMS = ['쇼피팀','라자다팀','도매팀','경영지원','물류팀'];
const CH_COLOR = {'ALI':'#AD1457','아마존':'#2E7D32','중':'#E65100','라자다':'#1565C0','라쿠텐':'#6A1B9A','쇼피':'#BF360C','큐텐':'#00838F','월마트':'#1A237E','네이버':'#388E3C','쿠팡':'#D84315','카페24':'#6A1B9A','쇼피파이(J)':'#00695C','쇼피파이(G)':'#C62828','엘지유플러스':'#283593','광업':'#4E342E','일반도매':'#558B2F','공통':'#757575'};

let state = {
  page: 'upload',
  mgmtUnlocked: false,
  vouchers: [],
  history: [],
  loading: false,
  upDateFrom: '2026-01-01',
  upDateTo: '2026-01-31',
  pendingRows: [],
};

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
const fmt = n => Math.round(Number(n||0)).toLocaleString('ko-KR');
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const s = v => (['nan','NaN','undefined','null'].includes(String(v||'').trim())) ? '' : String(v||'').trim();
const pn = v => { try{ return parseFloat(String(v||0).replace(/[,\s원$]/g,''))||0; }catch{ return 0; }};
function fd(v){
  if(!v) return '';
  if(v instanceof Date) return v.toISOString().slice(0,10);
  const str=String(v);
  if(str.includes('T')) return str.slice(0,10);
  if(str.match(/^\d{4}-\d{2}-\d{2}/)) return str.slice(0,10);
  return str;
}
function chBadge(ch){
  if(!ch) return '<span class="badge b-none">미부여</span>';
  const cls = 'ch-'+ch.replace(/[()]/g,'');
  return `<span class="badge ${cls}">${ch}</span>`;
}
function fileIcon(name){
  const ext = (name||'').split('.').pop().toLowerCase();
  if(ext==='pdf') return 'pdf';
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return 'img';
  return 'etc';
}
function fileSize(bytes){
  if(bytes < 1024) return bytes+'B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

// 토스트
function toast(msg, type='info'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(()=>el.classList.remove('show'), 2800);
}

// 모달
function openModal(title, bodyHTML, footerHTML=''){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e){
  if(!e || e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display = 'none';
}

// ══════════════════════════════════════════════
// 네비게이션
// ══════════════════════════════════════════════
const PAGE_META = {
  upload:  {title:'팀별 업로드', sub:'엑셀 양식으로 전표를 업로드하세요'},
  list:    {title:'전표 조회', sub:'전체 전표 내역 및 증빙 파일 확인'},
  channel: {title:'채널별 분석', sub:'채널별 판관비 집계'},
  summary: {title:'기간별 요약', sub:'업로드 기간별 비용 요약'},
};
function goPage(page){
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_META[page].title;
  document.getElementById('page-sub').textContent = PAGE_META[page].sub;
  renderPage();
}

// ══════════════════════════════════════════════
// 경영지원팀 인증
// ══════════════════════════════════════════════
function handleMgmtClick(){
  if(state.mgmtUnlocked){ lockMgmt(); return; }
  openModal('경영지원팀 로그인',
    `<div class="form-group"><label class="field-label">비밀번호</label>
     <input type="password" id="pw-inp" placeholder="경영지원팀 비밀번호" onkeydown="if(event.key==='Enter')submitPw()">
     <div id="pw-err" style="font-size:12px;color:var(--red);display:none;margin-top:4px">비밀번호가 올바르지 않습니다.</div></div>
     <div style="font-size:11px;color:var(--text3);background:var(--bg2);padding:8px 10px;border-radius:var(--radius)">초기 비밀번호: <strong>mgmt2026</strong></div>`,
    `<button class="btn" onclick="closeModal()">취소</button>

}
function submitPw(){
  const pw = document.getElementById('pw-inp')?.value||'';
  if(pw === MGMT_PW){
    state.mgmtUnlocked = true;
    closeModal();
    const btn = document.getElementById('mgmt-status-btn');
    btn.className = 'mgmt-status unlocked';
    document.getElementById('mgmt-status-txt').textContent = '경영지원팀 (잠금 해제)';

function lockMgmt(){

// ══════════════════════════════════════════════
// 데이터 로드
// ══════════════════════════════════════════════
async function loadVouchers(){
  state.loading = true;
  try {
    const { data, error } = await sb.from('vouchers').select('*').order('created_at', {ascending:false});
    if(error) throw error;
    state.vouchers = data || [];
    // 미부여 뱃지
    const pending = state.vouchers.filter(r=>!r.채널).length;
    const badge = document.getElementById('pending-badge');
    if(badge) badge.style.display = pending > 0 ? 'inline' : 'none';
  } catch(e){ toast('데이터 로드 실패: '+e.message, 'error'); }
  state.loading = false;
}
async function loadHistory(){
  try {
    const { data } = await sb.from('upload_history').select('*').order('created_at',{ascending:false}).limit(20);
    state.history = data || [];
  } catch(e){}
}

// ══════════════════════════════════════════════
// 페이지 렌더링
// ══════════════════════════════════════════════
function renderPage(){
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 로딩 중...</div>';
  if(state.page==='upload') renderUpload();
  else if(state.page==='list') renderList();
  else if(state.page==='channel') renderChannel();
  else if(state.page==='summary') renderSummary();
}

function setQuick(type){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  let f,t;
  if(type==='jan'){f=`${y}-01-01`;t=`${y}-01-31`;}
  else if(type==='feb'){f=`${y}-02-01`;t=new Date(y,2,0).toISOString().slice(0,10);}
  else if(type==='q1'){f=`${y}-01-01`;t=`${y}-03-31`;}
  else if(type==='q2'){f=`${y}-04-01`;t=`${y}-06-30`;}
  else if(type==='lastMonth'){f=`${y}-${String(m).padStart(2,'0')}-01`;t=new Date(y,m,0).toISOString().slice(0,10);}
  else if(type==='thisMonth'){f=`${y}-${String(m+1).padStart(2,'0')}-01`;t=new Date(y,m+1,0).toISOString().slice(0,10);}
  state.upDateFrom=f; state.upDateTo=t;
  const fi=document.getElementById('up-from'), ti=document.getElementById('up-to');
  if(fi)fi.value=f; if(ti)ti.value=t;
}

function handleFile(file){
  if(!file) return;
  const fb=document.getElementById('up-feedback');
  if(fb){fb.style.display='block';fb.textContent=`읽는 중: ${file.name}`;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const type=document.getElementById('up-type')?.value||'card';
      const team=document.getElementById('up-team')?.value||'미지정';
      const from=document.getElementById('up-from')?.value||state.upDateFrom;
      const to=document.getElementById('up-to')?.value||state.upDateTo;
      const period=`${from}~${to}`;
      const rows=data.slice(4).filter(r=>r.some(c=>c!==''&&c!=null));
      state.pendingRows=[];
      if(type==='card'){
        rows.forEach(r=>{
          const amt=pn(r[9]); if(!amt) return;
          state.pendingRows.push({id:uid(),전표유형:'카드전표',전표일자:fd(r[0]),청구일자:fd(r[1]),
            카드사:s(r[2]),카드번호:s(r[3]),거래처명:s(r[4]),사업자번호:s(r[5]),
            계정과목:s(r[6]),공급가액:pn(r[7]),부가세:pn(r[8]),합계금액:amt,
            전표번호:s(r[10]),전표입력유형:s(r[11]),적요:s(r[12]),담당자:s(r[13]),
            팀명:team,채널:'',업로드팀:team,업로드기간:period});
        });
      } else {
        rows.forEach(r=>{
          const amt=pn(r[8]); if(!amt) return;
          state.pendingRows.push({id:uid(),전표유형:'매입전표',전표일자:fd(r[0]),청구일자:fd(r[0]),
            카드사:'',카드번호:'',거래처명:s(r[1]),사업자번호:s(r[2]),
            계정과목:s(r[4]),공급가액:pn(r[6]),부가세:pn(r[7]),합계금액:amt,
            전표번호:s(r[12]),전표입력유형:'매입매출전표',적요:s(r[13]),담당자:s(r[14]),
            팀명:team,채널:s(r[17])||'',업로드팀:team,업로드기간:period,
            차변계정:s(r[4]),대변계정:s(r[5]),적격증빙:s(r[11]),진행상황:s(r[15])});
        });
      }
      if(fb){fb.textContent=`✓ ${file.name} — ${state.pendingRows.length}건 인식됨`;}
      renderUpload();
    }catch(err){ if(fb){fb.style.display='block';fb.textContent='오류: '+err.message;} }
  };
  reader.readAsArrayBuffer(file);
}

async function confirmUpload(){
  if(!state.pendingRows.length) return;
  const btn = document.querySelector('[onclick="confirmUpload()"]');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  try{
    const { error } = await sb.from('vouchers').upsert(state.pendingRows);
    if(error) throw error;
    const team=state.pendingRows[0]?.업로드팀||'미지정';
    const period=state.pendingRows[0]?.업로드기간||'';
    const type=state.pendingRows[0]?.전표유형||'카드전표';
    await sb.from('upload_history').insert({team,period,type,cnt:state.pendingRows.length});
    toast(`${state.pendingRows.length}건이 등록됐습니다.`, 'success');
    state.pendingRows=[];
    renderUpload();
  }catch(e){ toast('저장 실패: '+e.message,'error'); if(btn){btn.disabled=false;btn.textContent=`등록 (${state.pendingRows.length}건)`;} }
}

// ── 전표 조회 ────────────────────────────────

      <th>계정과목</th><th style="text-align:right">합계금액</th>

function buildVoucherRows(recs){
  if(!recs.length) return '<tr><td colspan="12" style="text-align:center;padding:2rem;color:var(--text3)">전표가 없습니다.</td></tr>';
  return recs.map(r=>`<tr class="${!r.채널?'no-ch':''}">
    <td><span class="badge ${r.전표유형==='카드전표'?'b-card':'b-buy'}">${r.전표유형}</span></td>
    <td style="white-space:nowrap;font-size:11px">${r.전표일자||'-'}</td>
    <td style="font-size:11px">${r.팀명||'-'}</td>
    <td style="font-size:11px;color:var(--text2);white-space:nowrap">${r.업로드기간||'-'}</td>
    <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.거래처명||'-'}</td>
    <td style="font-size:11px;color:var(--text2)">${r.계정과목||'-'}</td>
    <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(r.합계금액)}원</td>
    <td style="font-size:11px">${r.담당자||'-'}</td>
    <td>${chBadge(r.채널)}</td>
    <td><button class="btn btn-sm" onclick="openFileModal('${r.id}','${(r.거래처명||'').replace(/'/g,"\\'")}')">증빙</button></td>
    <td style="font-size:11px;color:var(--text2)">${r.전표번호||'-'}</td>
    ${state.mgmtUnlocked?`<td>
      <select onchange="updateChannel('${r.id}',this.value)" style="font-size:11px;padding:3px 6px;width:120px">
        <option value="">-- 선택 --</option>${CHANNELS.map(c=>`<option ${r.채널===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </td>`:''}
  </tr>`).join('');
}

function applyFilter(){
  const period=document.getElementById('fl-period')?.value||'';
  const type=document.getElementById('fl-type')?.value||'';
  const team=document.getElementById('fl-team')?.value||'';
  const ch=document.getElementById('fl-ch')?.value||'';
  const q=(document.getElementById('fl-q')?.value||'').toLowerCase();
  const fl=state.vouchers.filter(r=>{
    if(period&&r.업로드기간!==period)return false;
    if(type&&r.전표유형!==type)return false;
    if(team&&r.팀명!==team)return false;
    if(ch==='__none'&&r.채널)return false;
    if(ch&&ch!=='__none'&&r.채널!==ch)return false;
    if(q&&!((r.거래처명||'').toLowerCase().includes(q)||(r.적요||'').toLowerCase().includes(q)))return false;
    return true;
  });
  const tb=document.getElementById('voucher-tbody');
  if(tb)tb.innerHTML=buildVoucherRows(fl);
  const cnt=document.getElementById('list-count');
  if(cnt)cnt.textContent=`${fl.length}건 / ${fmt(fl.reduce((s,r)=>s+Number(r.합계금액||0),0))}원`;
}

async function updateChannel(id, ch){
  if(!state.mgmtUnlocked){toast('경영지원팀 로그인이 필요합니다.','error');return;}
  try{
    const {error}=await sb.from('vouchers').update({채널:ch}).eq('id',id);
    if(error)throw error;
    const r=state.vouchers.find(x=>x.id===id);
    if(r)r.채널=ch;
    toast('채널이 저장됐습니다.','success');
    applyFilter();
    const pending=state.vouchers.filter(r=>!r.채널).length;
    const badge=document.getElementById('pending-badge');
    if(badge)badge.style.display=pending>0?'inline':'none';
  }catch(e){toast('저장 실패: '+e.message,'error');}
}

async function openFileModal(voucherId, merchantName){
  openModal(`증빙 파일 — ${merchantName}`,
    '<div class="loading"><div class="spinner"></div> 로딩 중...</div>',
    ''
  );
  try{
    const {data:files,error}=await sb.from('voucher_files').select('*').eq('voucher_id',voucherId).order('created_at');
    if(error)throw error;
    const fileListHTML = files.length
      ? files.map(f=>`
          <div class="file-item">
            <div class="file-icon ${fileIcon(f.file_name)}">${fileIcon(f.file_name).toUpperCase()}</div>
            <div class="file-info">
              <div class="file-name">${f.file_name}</div>
              <div class="file-size">${fileSize(f.file_size||0)} · ${new Date(f.created_at).toLocaleDateString('ko-KR')}</div>
            </div>
            <button class="btn btn-sm" onclick="downloadFile('${f.file_path}','${f.file_name}')">다운로드</button>
            ${state.mgmtUnlocked?`<button class="btn btn-sm btn-danger" onclick="deleteFile(${f.id},'${voucherId}','${merchantName}')">삭제</button>`:''}
          </div>`).join('')
      : '<div style="font-size:13px;color:var(--text3);text-align:center;padding:1.5rem">첨부된 증빙 파일이 없습니다.</div>';

    document.getElementById('modal-body').innerHTML = `
      ${fileListHTML}
      <div style="margin-top:14px;border-top:0.5px solid var(--border);padding-top:14px">
        <label class="field-label">증빙 파일 추가</label>
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text2)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v9M3 5l4-4 4 4M1 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          파일 선택 (JPG, PNG, PDF, Excel 등)
          <input type="file" multiple accept="image/*,.pdf,.xlsx,.xls,.docx,.doc" style="display:none"
            onchange="uploadFiles(this.files,'${voucherId}','${merchantName}')">
        </label>
        <span style="font-size:11px;color:var(--text3);margin-left:8px">최대 10MB / 건</span>
      </div>`;
    document.getElementById('modal-footer').innerHTML =
      `<button class="btn" onclick="closeModal()">닫기</button>`;
  }catch(e){
    document.getElementById('modal-body').innerHTML=`<div style="color:var(--red)">${e.message}</div>`;
  }
}

async function uploadFiles(fileList, voucherId, merchantName){
  const files = Array.from(fileList);
  if(!files.length) return;
  let uploaded = 0;
  for(const file of files){
    try{
      const path = `${voucherId}/${Date.now()}_${file.name}`;
      const {error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path, file, {upsert:true});
      if(upErr)throw upErr;
      const {error:dbErr}=await sb.from('voucher_files').insert({
        voucher_id:voucherId, file_name:file.name,
        file_path:path, file_type:file.type,
        file_size:file.size, uploaded_by:'팀원'
      });
      if(dbErr)throw dbErr;
      uploaded++;
    }catch(e){ toast(`${file.name} 업로드 실패: `+e.message,'error'); }
  }
  if(uploaded>0){
    toast(`${uploaded}개 파일이 업로드됐습니다.`,'success');
    openFileModal(voucherId, merchantName);
  }
}

async function downloadFile(path, fileName){
  try{
    const {data,error}=await sb.storage.from(STORAGE_BUCKET).download(path);
    if(error)throw error;
    const url=URL.createObjectURL(data);
    const a=document.createElement('a');
    a.href=url; a.download=fileName; a.click();
    URL.revokeObjectURL(url);
  }catch(e){ toast('다운로드 실패: '+e.message,'error'); }
}

async function deleteFile(fileId, voucherId, merchantName){
  if(!confirm('이 파일을 삭제하시겠습니까?')) return;
  try{
    const {data:fData}=await sb.from('voucher_files').select('file_path').eq('id',fileId).single();
    if(fData?.file_path) await sb.storage.from(STORAGE_BUCKET).remove([fData.file_path]);
    await sb.from('voucher_files').delete().eq('id',fileId);
    toast('파일이 삭제됐습니다.','info');
    openFileModal(voucherId, merchantName);
  }catch(e){ toast('삭제 실패: '+e.message,'error'); }
}

// ── 채널별 분석 ──────────────────────────────
async function renderChannel(){
  await loadVouchers();
  const fl = state.vouchers;
  if(!fl.length){document.getElementById('content').innerHTML='<div class="empty-state">데이터가 없습니다.</div>';return;}
  const total=fl.reduce((s,r)=>s+Number(r.합계금액||0),0);
  const chKey=v=>(!v)?'(미부여)':v;
  const allChs=[...CHANNELS,'(미부여)'];
  const byCh=allChs.map(ch=>({ch,amt:fl.filter(r=>chKey(r.채널)===ch).reduce((s,r)=>s+Number(r.합계금액||0),0),cnt:fl.filter(r=>chKey(r.채널)===ch).length}));
  const barHTML=byCh.filter(x=>x.amt>0).map(x=>{
    const pct=total?Math.round(x.amt/total*100):0;
    const col=CH_COLOR[x.ch]||'#888';
    return`<div style="width:${Math.max(pct,.5)}%;background:${col};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;overflow:hidden;white-space:nowrap;padding:0 3px" title="${x.ch}: ${fmt(x.amt)}원 (${pct}%)">${pct>5?x.ch:''}</div>`;
  }).join('');
  const chCards=byCh.filter(x=>x.amt>0).map(x=>`
    <div class="ch-card">
      <div style="margin-bottom:6px">${chBadge(x.ch==='(미부여)'?'':x.ch)}</div>
      <div style="font-size:15px;font-weight:600">${fmt(x.amt)}원</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${x.cnt}건 · ${total?Math.round(x.amt/total*100):0}%</div>
    </div>`).join('');
  const teams=[...new Set(fl.map(r=>r.팀명||'미지정'))].sort();
  const thChs=CHANNELS.map(c=>`<th style="text-align:right;font-size:10px">${c}</th>`).join('');
  const teamRows=teams.map(tm=>{
    const tr=fl.filter(r=>(r.팀명||'미지정')===tm);
    return`<tr><td><strong>${tm}</strong></td><td style="text-align:right;font-weight:600">${fmt(tr.reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>
    ${CHANNELS.map(ch=>{const v=tr.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}</tr>`;
  }).join('');
  const accts=[...new Set(fl.map(r=>r.계정과목||'기타'))].sort();
  const acctRows=accts.map(ac=>{
    const ar=fl.filter(r=>(r.계정과목||'기타')===ac);
    return`<tr><td><strong>${ac}</strong></td><td style="text-align:right;font-weight:600">${fmt(ar.reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>
    ${CHANNELS.map(ch=>{const v=ar.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}</tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="seg-bar">${barHTML}</div>
    <div class="ch-grid">${chCards}</div>
    <div style="height:0.5px;background:var(--border);margin:4px 0 20px"></div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">팀별 × 채널 비용</div>
    <div class="table-wrap" style="margin-bottom:24px"><table>
      <thead><tr><th>팀</th><th style="text-align:right">합계</th>${thChs}</tr></thead>
      <tbody>${teamRows}</tbody></table></div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">계정과목 × 채널 비용</div>
    <div class="table-wrap"><table>
      <thead><tr><th>계정과목</th><th style="text-align:right">합계</th>${thChs}</tr></thead>
      <tbody>${acctRows}</tbody></table></div>`;
}

// ── 기간별 요약 ──────────────────────────────
async function renderSummary(){
  await loadVouchers();
  const periods=[...new Set(state.vouchers.map(r=>r.업로드기간||''))].filter(Boolean).sort().reverse();
  if(!periods.length){document.getElementById('content').innerHTML='<div class="empty-state">데이터가 없습니다.</div>';return;}
  const thChs=CHANNELS.map(c=>`<th style="text-align:right;font-size:10px">${c}</th>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="table-wrap"><table><thead><tr>
    <th>업로드 기간</th><th>팀</th><th>건수</th><th style="text-align:right">합계</th>
    <th style="text-align:right">카드</th><th style="text-align:right">매입</th>
    ${thChs}<th style="text-align:right">미부여</th>
  </tr></thead><tbody>${periods.map(p=>{
    const teams=[...new Set(state.vouchers.filter(r=>r.업로드기간===p).map(r=>r.팀명||'미지정'))].sort();
    return teams.map((tm,ti)=>{
      const mr=state.vouchers.filter(r=>r.업로드기간===p&&(r.팀명||'미지정')===tm);
      const total=mr.reduce((s,r)=>s+Number(r.합계금액||0),0);
      const none=mr.filter(r=>!r.채널).reduce((s,r)=>s+Number(r.합계금액||0),0);
      return`<tr>
        ${ti===0?`<td rowspan="${teams.length}" style="font-weight:600;vertical-align:top;padding-top:10px;white-space:nowrap;font-size:12px">${p}</td>`:''}
        <td style="font-size:12px">${tm}</td><td>${mr.length}건</td>
        <td style="text-align:right;font-weight:600">${fmt(total)}원</td>
        <td style="text-align:right;font-size:11px;color:var(--text2)">${fmt(mr.filter(r=>r.전표유형==='카드전표').reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>
        <td style="text-align:right;font-size:11px;color:var(--text2)">${fmt(mr.filter(r=>r.전표유형==='매입전표').reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>
        ${CHANNELS.map(ch=>{const v=mr.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}
        <td style="text-align:right;font-size:11px;color:${none>0?'var(--red)':'var(--text2)'}">${none>0?fmt(none)+'원':'-'}</td>
      </tr>`;
    }).join('');
  }).join('')}</tbody></table></div>`;
}

// ── CSV 내보내기 ─────────────────────────────
function exportCSV(){
  if(!state.vouchers.length){toast('데이터가 없습니다.','info');return;}
  const h=['전표유형','전표일자','청구일자','팀명','채널','거래처명','사업자번호','계정과목','공급가액','부가세','합계금액','적요','담당자','전표번호','업로드기간'];
  const rows=state.vouchers.map(r=>h.map(k=>`"${String(r[k]||'').replace(/"/g,'""')}"`).join(','));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(h.join(',')+'\n'+rows.join('\n'));
  a.download='전표DB_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV 내보내기 완료','success');
}
