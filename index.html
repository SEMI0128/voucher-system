<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전표 통합 관리 시스템</title>
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a0a0;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.2);
  --r:8px;--rl:12px;
  --blue:#185FA5;--bbg:#E6F1FB;--btx:#0C447C;
  --red:#C62828;--rbg:#FFEBEE;
  --grn:#2E7D32;--gbg:#E8F5E9;
  --org:#E65100;--obg:#FFF3E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg2)}
/* 사이트 잠금 화면 */
#lock-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.lock-logo{font-size:40px;margin-bottom:16px}
.lock-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.lock-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:32px}
.lock-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:14px 16px;font-size:15px;color:#fff;text-align:center;letter-spacing:2px;outline:none;margin-bottom:16px}
.lock-input::placeholder{color:rgba(255,255,255,0.3);letter-spacing:0}
.lock-input:focus{border-color:rgba(255,255,255,0.4)}
.lock-btn{width:100%;background:#185FA5;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;color:#fff;cursor:pointer}
.lock-btn:hover{background:#1565C0}
.lock-err{font-size:12px;color:#EF9A9A;margin-top:10px;display:none}
/* 레이아웃 */
.layout{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--bg);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--bd)}
.sb-logo-t{font-size:13px;font-weight:700}
.sb-logo-s{font-size:11px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;padding:4px 8px;margin-top:10px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--bbg);color:var(--btx);font-weight:500}
.nb{margin-left:auto;font-size:10px;font-weight:700;background:#FF9800;color:#fff;padding:1px 5px;border-radius:8px}
.sb-bottom{padding:10px 8px;border-top:0.5px solid var(--bd)}
.mgmt-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;width:100%;border:none;background:var(--bg2);color:var(--text2)}
.mgmt-btn:hover{background:var(--bg3)}
.mgmt-btn.on{background:var(--obg);color:var(--org);font-weight:500}
.main{margin-left:210px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-t{font-size:15px;font-weight:600}
.topbar-s{font-size:12px;color:var(--text3);margin-top:1px}
.content{padding:20px 24px;flex:1}
/* 버튼 */
.btn{padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;border:0.5px solid var(--bd2);background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--text);color:var(--bg);border-color:transparent}.btn-p:hover{opacity:.85}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:var(--red);color:#fff;border-color:transparent}
.btn-blue{background:var(--blue);color:#fff;border-color:transparent}
.btn-green{background:#2E7D32;color:#fff;border-color:transparent}
.btn-org{background:var(--org);color:#fff;border-color:transparent}
/* 폼 */
input,select,textarea{font-size:13px;font-family:inherit;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r);padding:8px 10px;color:var(--text);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--bg)}
input[readonly],input:disabled,select:disabled,textarea[readonly]{background:var(--bg3);color:var(--text2)}
textarea{resize:vertical;min-height:60px}
.fl{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
.fg{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* 카드 */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px}
.card-t{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sn{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* 메트릭 */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px}
.ml{font-size:12px;color:var(--text2);margin-bottom:5px}
.mv{font-size:20px;font-weight:700}
.ms{font-size:11px;color:var(--text3);margin-top:3px}
/* 뱃지 */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.b-card{background:#E3F2FD;color:#0D47A1}
.b-buy{background:#FFF3E0;color:#BF360C}
.b-manual{background:#F3E5F5;color:#4A148C}
.b-none{background:#FFEBEE;color:#C62828}
.b-ok{background:#E8F5E9;color:#1B5E20}
.b-ALI{background:#FCE4EC;color:#880E4F}
.b-아마존{background:#E8F5E9;color:#1B5E20}
.b-중{background:#FFF8E1;color:#E65100}
.b-라자다{background:#E3F2FD;color:#0D47A1}
.b-라쿠텐{background:#F3E5F5;color:#4A148C}
.b-쇼피{background:#FFCCBC;color:#BF360C}
.b-큐텐{background:#E0F7FA;color:#006064}
.b-월마트{background:#E8EAF6;color:#1A237E}
.b-네이버{background:#E8F5E9;color:#2E7D32}
.b-쿠팡{background:#FFF3E0;color:#BF360C}
.b-카페24{background:#F3E5F5;color:#6A1B9A}
.b-쇼피파이J{background:#E0F2F1;color:#004D40}
.b-쇼피파이G{background:#FBE9E7;color:#C62828}
.b-엘지유플러스{background:#E8EAF6;color:#283593}
.b-광업{background:#EFEBE9;color:#3E2723}
.b-일반도매{background:#F1F8E9;color:#33691E}
.b-공통{background:#F5F5F5;color:#424242}
/* 테이블 */
.tw{overflow-x:auto;border:0.5px solid var(--bd);border-radius:var(--rl);background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:500;color:var(--text2);text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--bg2)}
td{padding:7px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
.vrow{cursor:pointer}
.vrow:hover td{background:#f0f4ff}
.no-ch td{background:rgba(255,152,0,0.04)}
/* 필터 */
.fb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb input,.fb select{width:auto;font-size:12px;padding:6px 9px}
/* 업로드 존 */
.uz{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:2rem;text-align:center;cursor:pointer}
.uz:hover,.uz.drag{background:var(--bg2)}
/* 날짜 범위 */
.dr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--bd);margin-bottom:10px;flex-wrap:wrap}
.dr input[type=date]{width:150px}
.qb-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.qb{padding:3px 10px;font-size:11px;border-radius:6px;cursor:pointer;border:0.5px solid var(--bd2);background:var(--bg);color:var(--text2)}
.qb:hover{background:var(--text);color:var(--bg);border-color:transparent}
/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-sm{max-width:440px}
.modal-lg{max-width:900px}
.mh{padding:18px 20px 14px;border-bottom:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:1}
.mh-t{font-size:15px;font-weight:600}
.mb{padding:20px}
.mf{padding:12px 20px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:0.5px solid var(--bd)}
.mc{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;padding:2px 6px;border-radius:4px}
.mc:hover{background:var(--bg2);color:var(--text)}
/* 분개 테이블 */
.jt{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.jt th{background:var(--bg2);padding:6px 8px;font-weight:500;color:var(--text2);border:0.5px solid var(--bd);text-align:left}
.jt td{padding:6px 8px;border:0.5px solid var(--bd)}
.jt input,.jt select{padding:4px 6px;font-size:12px;border-radius:4px}
/* 전표 직접 입력 */
.voucher-form{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.vf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--blue)}
.vf-title{font-size:16px;font-weight:700;color:var(--blue)}
.vf-no{font-size:12px;color:var(--text3);font-family:monospace}
.section-divider{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 6px;border-bottom:0.5px solid var(--bd);margin-bottom:12px}
.jentry-row{display:grid;grid-template-columns:80px 1fr 1fr 100px 100px 100px 80px;gap:6px;align-items:center;margin-bottom:6px}
.jentry-row input,.jentry-row select{font-size:12px;padding:5px 7px}
.jentry-header{display:grid;grid-template-columns:80px 1fr 1fr 100px 100px 100px 80px;gap:6px;margin-bottom:4px}
.jentry-header span{font-size:11px;font-weight:500;color:var(--text2);padding:0 4px}
.total-row{display:flex;justify-content:flex-end;gap:20px;padding:10px 0;border-top:0.5px solid var(--bd);margin-top:8px}
.total-item{font-size:13px}
.total-item strong{font-size:16px;font-weight:700;margin-left:8px}
.balance-ok{color:var(--grn)}
.balance-err{color:var(--red)}
/* 채널 분석 */
.seg{display:flex;border-radius:var(--r);overflow:hidden;height:28px;margin-bottom:14px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:18px}
.cc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:10px 12px}
/* 토스트 */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.t-success{background:#1B5E20;color:#fff}
.t-error{background:#B71C1C;color:#fff}
.t-info{background:#0D47A1;color:#fff}
/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text3);gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.hi{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.hi:last-child{border-bottom:none}
/* 전표 상세 */
.ds{margin-bottom:16px}
.ds-t{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--bd)}
/* 탭 (전표입력 내부) */
.inner-tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--bd);margin-bottom:16px}
.inner-tab{padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text2);border:none;border-bottom:2px solid transparent;background:none}
.inner-tab.active{color:var(--blue);border-bottom:2px solid var(--blue);font-weight:500}
</style>
</head>
<body>

<!-- 사이트 잠금 화면 -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">🔐</div>
    <div class="lock-title">전표 통합 관리 시스템</div>
    <div class="lock-sub">접속 비밀번호를 입력하세요</div>
    <input type="password" class="lock-input" id="lock-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button class="lock-btn" onclick="tryUnlock()">접속</button>
    <div id="lock-err" class="lock-err">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 메인 앱 (잠금 해제 후 표시) -->
<div id="app" style="display:none">
<div class="layout">
  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-t">전표 통합 관리</div>
      <div class="sb-logo-s">카드 + 매입 + 직접입력</div>
    </div>
    <div class="sb-nav">
      <div class="nav-sec">입력</div>
      <button class="nav-item active" id="nav-entry" onclick="goPage('entry')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 7h6M7 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        전표 직접 입력
      </button>
      <button class="nav-item" id="nav-upload" onclick="goPage('upload')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v9M7 1L3.5 4.5M7 1L10.5 4.5M1 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        파일 업로드
      </button>
      <div class="nav-sec">조회/분석</div>
      <button class="nav-item" id="nav-list" onclick="goPage('list')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1.5" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 5.5h6M4 8.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        전표 조회
        <span class="nb" id="pb" style="display:none">!</span>
      </button>
      <button class="nav-item" id="nav-channel" onclick="goPage('channel')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5V7l3.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        채널별 분석
      </button>
      <button class="nav-item" id="nav-summary" onclick="goPage('summary')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 12V6l3-3 4 4 4-4v10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        기간별 요약
      </button>
    </div>
    <div class="sb-bottom">
      <button class="mgmt-btn" id="mgmt-btn" onclick="handleMgmtClick()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="5.5" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 5.5V4A3 3 0 0 1 9.5 4v1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="mgmt-txt">경영지원팀 로그인</span>
      </button>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-t" id="pg-title">전표 직접 입력</div><div class="topbar-s" id="pg-sub">일반전표 · 매입매출전표 직접 입력</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportCSV()">CSV 내보내기</button>
        <button class="btn btn-sm" style="color:var(--text3)" onclick="lockSite()">로그아웃</button>
      </div>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spin"></div>로딩 중...</div></div>
  </div>
</div>
</div>

<!-- 전표 상세 모달 -->
<div class="ov" id="dov" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mh">
      <div class="mh-t" id="d-title">전표 상세</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm btn-blue" id="edit-btn" onclick="toggleEdit()">수정</button>
        <button class="mc" onclick="closeDetail()">×</button>
      </div>
    </div>
    <div class="mb" id="d-body"></div>
    <div class="mf">
      <button class="btn" onclick="closeDetail()">닫기</button>
      <button class="btn btn-p" id="save-btn" style="display:none" onclick="saveDetail()">저장</button>
    </div>
  </div>
</div>

<!-- 경영지원팀 비밀번호 모달 -->
<div class="ov" id="pwov" style="display:none" onclick="if(event.target===this)closePw()">
  <div class="modal modal-sm" onclick="event.stopPropagation()">
    <div class="mh"><div class="mh-t">경영지원팀 인증</div><button class="mc" onclick="closePw()">×</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">비밀번호</label>
        <input type="password" id="pw-inp" placeholder="경영지원팀 비밀번호" onkeydown="if(event.key==='Enter')submitPw()">
        <div id="pw-err" style="font-size:12px;color:var(--red);margin-top:4px;display:none">비밀번호가 올바르지 않습니다.</div>
      </div>
      <div style="font-size:11px;color:var(--text3);background:var(--bg2);padding:8px 10px;border-radius:var(--r)">초기 비밀번호: <strong>mgmt2026</strong></div>
    </div>
    <div class="mf"><button class="btn" onclick="closePw()">취소</button><button class="btn btn-p" onclick="submitPw()">확인</button></div>
  </div>
</div>

<!-- 증빙 파일 모달 -->
<div class="ov" id="fov" style="display:none" onclick="if(event.target===this)closeFM()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mh"><div class="mh-t" id="fm-title">증빙 파일</div><button class="mc" onclick="closeFM()">×</button></div>
    <div class="mb" id="fm-body"></div>
    <div class="mf"><button class="btn" onclick="closeFM()">닫기</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

let sb = null;
function loadSupabase(cb){
  if(sb){cb&&cb();return;}
  const s1=document.createElement('script');
  s1.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s1.onload=()=>{
    sb=supabase.createClient(SB_URL,SB_KEY);
    cb&&cb();
  };
  s1.onerror=()=>{
    // CDN 실패 시 로컬 스토리지 폴백
    sb=makeFallbackSb();
    cb&&cb();
  };
  document.head.appendChild(s1);
}

// 로컬스토리지 폴백 (Supabase 로드 실패 시)
function makeFallbackSb(){
  const store=()=>JSON.parse(localStorage.getItem('vs_data')||'{"vouchers":[],"history":[]}');
  const save=d=>localStorage.setItem('vs_data',JSON.stringify(d));
  return {
    from:(t)=>({
      select:()=>({
        order:()=>({
          data: t==='vouchers'?store().vouchers:store().history,
          error:null,
          limit:()=>({data:store().history.slice(0,20),error:null}),
        }),
        eq:(k,v)=>({order:()=>({data:[],error:null}),single:()=>({data:null,error:null})}),
      }),
      upsert:(rows)=>{const d=store();d.vouchers=[...d.vouchers,...rows];save(d);return{error:null};},
      update:(row)=>({eq:(k,v)=>{const d=store();const i=d.vouchers.findIndex(x=>x[k]===v);if(i>=0)d.vouchers[i]={...d.vouchers[i],...row};save(d);return{error:null};}}),
      insert:(row)=>{const d=store();if(Array.isArray(row))d.history=[row[0],...d.history];else d.vouchers.push(row);save(d);return{error:null};},
      delete:()=>({eq:()=>({error:null})}),
    }),
    storage:{from:()=>({
      upload:async()=>({error:null}),
      download:async()=>({data:new Blob(),error:null}),
      remove:async()=>({error:null}),
    })},
  };
}

}

  const rows=document.getElementById('jentry-rows');
  if(rows)rows.innerHTML=buildEntryRows();
  updateTotals();
}

function removeEntryRow(i){
  if(G.entries.length<=2){toast('최소 2개 행이 필요합니다.','error');return}
  G.entries.splice(i,1);
  const rows=document.getElementById('jentry-rows');
  if(rows)rows.innerHTML=buildEntryRows();
  updateTotals();
}

function updateTotals(){
  const dr=G.entries.filter(e=>e.구분==='차변').reduce((s,e)=>s+e.합계,0);
  const cr=G.entries.filter(e=>e.구분==='대변').reduce((s,e)=>s+e.합계,0);
  const tdEl=document.getElementById('total-dr');
  const tcEl=document.getElementById('total-cr');
  const bsEl=document.getElementById('balance-status');
  if(tdEl)tdEl.textContent=fmt(dr);
  if(tcEl)tcEl.textContent=fmt(cr);
  if(bsEl){
    if(dr===0&&cr===0){bsEl.innerHTML=''}
    else if(dr===cr){bsEl.innerHTML='<span class="balance-ok" style="font-weight:600">✓ 대차 일치</span>'}
    else{bsEl.innerHTML=`<span class="balance-err" style="font-weight:600">⚠ 차액: ${fmt(Math.abs(dr-cr))}원</span>`}
  }
}

async function saveEntry(){
  const date=document.getElementById('ef-date')?.value||'';
  const partner=document.getElementById('ef-partner')?.value||'';
  const handler=document.getElementById('ef-handler')?.value||'';
  const team=document.getElementById('ef-team')?.value||'';
  const memo=document.getElementById('ef-memo')?.value||'';
  const channel=document.getElementById('ef-channel')?.value||'';
  const evid=document.getElementById('ef-evid')?.value||'';
  const bizno=document.getElementById('ef-bizno')?.value||'';

  if(!date||!partner){toast('전표일자와 거래처명은 필수입니다.','error');return}
  const dr=G.entries.filter(e=>e.구분==='차변').reduce((s,e)=>s+e.합계,0);
  const cr=G.entries.filter(e=>e.구분==='대변').reduce((s,e)=>s+e.합계,0);
  if(dr!==cr){toast('대차가 일치하지 않습니다.','error');return}

  const records=G.entries.filter(e=>e.합계>0||e.계정과목).map(e=>({
    id:uid(),
    전표유형:G.entryType==='일반전표'?'일반전표':'매입매출전표',
    입력방식:'직접입력',
    전표일자:date, 청구일자:date,
    거래처명:partner, 사업자번호:bizno,
    계정과목:e.계정과목, 차변대변:e.구분,
    공급가액:e.공급가액, 부가세:e.부가세, 합계금액:e.합계,
    적요:e.적요||memo, 담당자:handler,
    팀명:team, 채널:channel, 업로드기간:date.slice(0,7),
    적격증빙:evid, 전표번호:'VCH-'+uid().toUpperCase().slice(-6),
  }));

  try{
    const {error}=await sb.from('vouchers').upsert(records);
    if(error)throw error;
    toast(`${records.length}건 저장됐습니다.`,'success');
    clearEntryForm();
  }catch(e){toast('저장 실패: '+e.message,'error')}
}

function loadVSPromise(){
  return new Promise(async resolve=>{
    try{
      const r=await sb.from('vouchers').select('*').order('created_at',{ascending:false});
      G.vs=r.data||[];
      const p=G.vs.filter(r=>!r.채널).length;
      const b=document.getElementById('pb');
      if(b)b.style.display=p>0?'inline':'none';
    }catch(e){G.vs=[];}
    resolve();
  });
}
async function loadVS(){await loadVSPromise();}
async function loadHist(){
  try{const r=await sb.from('upload_history').select('*').order('created_at',{ascending:false});r.data&&(G.hist=(r.data||[]).slice(0,20))}catch{}
}

function setQ(t){const n=new Date(),y=n.getFullYear(),m=n.getMonth();let f,e;if(t==='jan'){f=`${y}-01-01`;e=`${y}-01-31`}else if(t==='feb'){f=`${y}-02-01`;e=new Date(y,2,0).toISOString().slice(0,10)}else if(t==='q1'){f=`${y}-01-01`;e=`${y}-03-31`}else if(t==='q2'){f=`${y}-04-01`;e=`${y}-06-30`}else if(t==='last'){f=`${y}-${String(m).padStart(2,'0')}-01`;e=new Date(y,m,0).toISOString().slice(0,10)}else{f=`${y}-${String(m+1).padStart(2,'0')}-01`;e=new Date(y,m+1,0).toISOString().slice(0,10)}G.uf=f;G.ut=e;const fi=document.getElementById('uf'),ti=document.getElementById('ut');if(fi)fi.value=f;if(ti)ti.value=e}

function handleFile(file){
  if(!file)return;
  if(!window.XLSX){
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>processFile(file);
    document.head.appendChild(s);
  } else processFile(file);
}
function processFile(file){
  const fb=document.getElementById('ufb');if(fb){fb.style.display='block';fb.textContent=`읽는 중: ${file.name}`}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const type=document.getElementById('up-type')?.value||'card';
      const team=document.getElementById('up-team')?.value||'미지정';
      const from=document.getElementById('uf')?.value||G.uf;
      const to=document.getElementById('ut')?.value||G.ut;
      const period=`${from}~${to}`;
      const rows=data.slice(4).filter(r=>r.some(c=>c!==''&&c!=null));
      G.pend=[];
      if(type==='card'){rows.forEach(r=>{const amt=pn(r[9]);if(!amt)return;G.pend.push({id:uid(),전표유형:'카드전표',입력방식:'파일업로드',전표일자:fd(r[0]),청구일자:fd(r[1]),카드사:cl(r[2]),카드번호:cl(r[3]),거래처명:cl(r[4]),사업자번호:cl(r[5]),계정과목:cl(r[6]),공급가액:pn(r[7]),부가세:pn(r[8]),합계금액:amt,전표번호:cl(r[10]),전표입력유형:cl(r[11]),적요:cl(r[12]),담당자:cl(r[13]),팀명:team,채널:'',업로드팀:team,업로드기간:period})})}
      else{rows.forEach(r=>{const amt=pn(r[8]);if(!amt)return;G.pend.push({id:uid(),전표유형:'매입전표',입력방식:'파일업로드',전표일자:fd(r[0]),청구일자:fd(r[0]),거래처명:cl(r[1]),사업자번호:cl(r[2]),계정과목:cl(r[4]),공급가액:pn(r[6]),부가세:pn(r[7]),합계금액:amt,전표번호:cl(r[12]),전표입력유형:'매입매출전표',적요:cl(r[13]),담당자:cl(r[14]),팀명:team,채널:cl(r[17])||'',업로드팀:team,업로드기간:period,차변계정:cl(r[4]),대변계정:cl(r[5]),적격증빙:cl(r[11]),진행상황:cl(r[15])})})}
      if(fb)fb.textContent=`✓ ${file.name} — ${G.pend.length}건 인식됨`;
      renderUpload();
    }catch(err){if(fb){fb.style.display='block';fb.textContent='오류: '+err.message}}
  };
  reader.readAsArrayBuffer(file);
}

async function confirmUpload(){
  if(!G.pend.length)return;
  const btn=document.querySelector('[onclick="confirmUpload()"]');
  if(btn){btn.disabled=true;btn.textContent='저장 중...'}
  try{
    const{error}=await sb.from('vouchers').upsert(G.pend);if(error)throw error;
    await sb.from('upload_history').insert({team:G.pend[0]?.업로드팀||'미지정',period:G.pend[0]?.업로드기간||'',type:G.pend[0]?.전표유형||'카드전표',cnt:G.pend.length});
    toast(`${G.pend.length}건 등록됐습니다.`,'success');G.pend=[];renderUpload();
  }catch(e){toast('저장 실패: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent=`등록 (${G.pend.length}건)`}}
}

function buildRows(recs){
  if(!recs.length)return'<tr><td colspan="12" style="text-align:center;padding:2.5rem;color:var(--text3)">전표가 없습니다.</td></tr>';
  return recs.map(r=>`<tr class="vrow${!r.채널?' no-ch':''}" onclick="openDetail('${r.id}')">
    <td><span class="badge ${r.전표유형==='카드전표'?'b-card':r.입력방식==='직접입력'?'b-manual':'b-buy'}">${r.전표유형||'전표'}</span></td>
    <td style="font-size:10px;color:var(--text3)">${r.입력방식==='직접입력'?'직접':'파일'}</td>
    <td style="white-space:nowrap;font-size:11px">${r.전표일자||'-'}</td>

    <td><button class="btn btn-sm" onclick="event.stopPropagation();openFM('${r.id}','${(r.거래처명||'').replace(/'/g,"\\'")}')">파일</button></td>
    <td style="font-size:11px;color:var(--text2)">${r.전표번호||'-'}</td>
  </tr>`).join('');

function applyF(){
  const p=document.getElementById('fl-p')?.value||'',t=document.getElementById('fl-t')?.value||'',im=document.getElementById('fl-i')?.value||'',tm=document.getElementById('fl-tm')?.value||'',ch=document.getElementById('fl-ch')?.value||'',q=(document.getElementById('fl-q')?.value||'').toLowerCase();
  const fl=G.vs.filter(r=>{
    if(p&&r.업로드기간!==p)return false;
    if(t&&r.전표유형!==t)return false;
    if(im&&r.입력방식!==im)return false;
    if(tm&&r.팀명!==tm)return false;
    if(ch==='__none'&&r.채널)return false;
    if(ch&&ch!=='__none'&&r.채널!==ch)return false;
    if(q&&!((r.거래처명||'').toLowerCase().includes(q)||(r.적요||'').toLowerCase().includes(q)))return false;
    return true;
  });
  const tb=document.getElementById('vtb');if(tb)tb.innerHTML=buildRows(fl);
  const cnt=document.getElementById('vcnt');if(cnt)cnt.textContent=`${fl.length}건 · ${fmt(fl.reduce((s,r)=>s+Number(r.합계금액||0),0))}원`;
}

async function uploadFiles(fl,vid,mn){
  const files=Array.from(fl);let done=0;
  for(const f of files){try{const path=`${vid}/${Date.now()}_${f.name}`;const{error:ue}=await sb.storage.from(BUCKET).upload(path,f,{upsert:true});if(ue)throw ue;await sb.from('voucher_files').insert({voucher_id:vid,file_name:f.name,file_path:path,file_type:f.type,file_size:f.size,uploaded_by:'팀원'});done++}catch(e){toast(`${f.name} 실패: `+e.message,'error')}}
  if(done>0){toast(`${done}개 업로드됐습니다.`,'success');openFM(vid,mn)}
}
async function dlFile(path,fn){try{const{data,error}=await sb.storage.from(BUCKET).download(path);if(error)throw error;const url=URL.createObjectURL(data);const a=document.createElement('a');a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url)}catch(e){toast('다운로드 실패: '+e.message,'error')}}
async function delFile(fid,vid,mn){if(!confirm('삭제하시겠습니까?'))return;try{const{data:fd}=await sb.from('voucher_files').select('file_path').eq('id',fid).single();if(fd?.file_path)await sb.storage.from(BUCKET).remove([fd.file_path]);await sb.from('voucher_files').delete().eq('id',fid);toast('삭제됐습니다.','info');openFM(vid,mn)}catch(e){toast('삭제 실패: '+e.message,'error')}}
