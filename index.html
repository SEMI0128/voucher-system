<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전표 통합 관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#eeecea;--text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a0a0;--bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.2);--r:8px;--rl:12px;--blue:#185FA5;--bbg:#E6F1FB;--btx:#0C447C;--red:#C62828;--rbg:#FFEBEE;--grn:#2E7D32;--gbg:#E8F5E9;--org:#E65100;--obg:#FFF3E0;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh}

/* 사이트 잠금 */
#site-lock{position:fixed;inset:0;background:var(--bg2);z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-box{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.08)}
.lock-logo{font-size:22px;font-weight:700;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.lock-err{font-size:12px;color:var(--red);margin-top:6px;display:none}

/* 앱 레이아웃 */
#app{display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--bd)}
.sb-logo-t{font-size:13px;font-weight:700}
.sb-logo-s{font-size:11px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;padding:4px 8px;margin-top:10px;margin-bottom:3px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--bg2);color:var(--text)}
.nav-btn.on{background:var(--bbg);color:var(--btx);font-weight:500}
.nb{margin-left:auto;font-size:10px;font-weight:700;background:#FF9800;color:#fff;padding:1px 5px;border-radius:8px}
.sb-bottom{padding:10px 8px;border-top:0.5px solid var(--bd)}
.mgmt-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;width:100%;border:none;background:var(--bg2);color:var(--text2)}
.mgmt-btn:hover{background:var(--bg3)}
.mgmt-btn.on{background:var(--obg);color:var(--org);font-weight:500}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-t{font-size:15px;font-weight:600}
.topbar-s{font-size:12px;color:var(--text3);margin-top:1px}
.content{padding:20px 24px;flex:1}

/* 버튼 */
.btn{padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;border:0.5px solid var(--bd2);background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--text);color:var(--bg);border-color:transparent}.btn-p:hover{opacity:.85}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:var(--red);color:#fff;border-color:transparent}.btn-danger:hover{opacity:.85}
.btn-blue{background:var(--blue);color:#fff;border-color:transparent}.btn-blue:hover{opacity:.85}
.btn-grn{background:var(--grn);color:#fff;border-color:transparent}.btn-grn:hover{opacity:.85}
.btn-org{background:var(--org);color:#fff;border-color:transparent}

/* 폼 */
input,select,textarea{font-size:13px;font-family:inherit;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r);padding:8px 10px;color:var(--text);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--bg)}
input[readonly],textarea[readonly]{background:var(--bg3);color:var(--text2);cursor:default}
textarea{resize:vertical;min-height:60px}
.fl{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
.fg{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* 자동완성 */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200;max-height:180px;overflow-y:auto;display:none}
.ac-item{padding:8px 12px;font-size:13px;cursor:pointer}
.ac-item:hover,.ac-item.selected{background:var(--bbg);color:var(--btx)}

/* 카드/메트릭 */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px}
.card-t{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sn{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px}
.ml{font-size:12px;color:var(--text2);margin-bottom:5px}
.mv{font-size:20px;font-weight:700}
.ms{font-size:11px;color:var(--text3);margin-top:3px}

/* 뱃지 */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.b-card{background:#E3F2FD;color:#0D47A1}.b-buy{background:#FFF3E0;color:#BF360C}
.b-manual{background:#F3E5F5;color:#4A148C}.b-none{background:#FFEBEE;color:#C62828}

/* 테이블 */
.tw{overflow-x:auto;border:0.5px solid var(--bd);border-radius:var(--rl);background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:500;color:var(--text2);text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--bg2)}
td{padding:7px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
.vrow{cursor:pointer}.vrow:hover td{background:#f0f4ff}
.no-ch td{background:rgba(255,152,0,0.04)}
.no-evid td:first-child{color:var(--red)}

/* 분개 테이블 */
.jt{width:100%;border-collapse:collapse;font-size:12px}
.jt th{background:var(--bg2);padding:7px 8px;font-weight:500;color:var(--text2);border:0.5px solid var(--bd);text-align:left}
.jt td{padding:4px 5px;border:0.5px solid var(--bd)}
.jt td input,.jt td select{border:none;background:transparent;padding:4px 6px;font-size:12px;min-width:0}
.jt td input:focus,.jt td select:focus{background:var(--bbg);border-radius:4px}
.jt tfoot td{background:var(--bg2);font-weight:600;font-size:12px;padding:6px 8px;border:0.5px solid var(--bd)}
.jt-d{background:#f0f7ff}.jt-c{background:#fff8f0}
.del-row{background:none;border:none;cursor:pointer;color:#fff;background:var(--red);border-radius:4px;padding:2px 6px;font-size:11px}

/* 필터바 */
.fb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb input,.fb select{width:auto;font-size:12px;padding:6px 9px}

/* 업로드존 */
.uz{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:2rem;text-align:center;cursor:pointer}
.uz:hover,.uz.drag{background:var(--bg2)}

/* 날짜범위 */
.dr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--bd);margin-bottom:10px;flex-wrap:wrap}
.dr input[type=date]{width:150px}
.qb-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.qb{padding:3px 10px;font-size:11px;border-radius:6px;cursor:pointer;border:0.5px solid var(--bd2);background:var(--bg);color:var(--text2)}
.qb:hover{background:var(--text);color:var(--bg);border-color:transparent}

/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-sm{max-width:460px}
.mh{padding:18px 20px 14px;border-bottom:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:1}
.mh-t{font-size:15px;font-weight:600}
.mb{padding:20px}
.mf{padding:12px 20px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:0.5px solid var(--bd)}
.mc{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;padding:2px 6px;border-radius:4px}
.mc:hover{background:var(--bg2);color:var(--text)}

/* 전표 섹션 */
.es{margin-bottom:18px}
.es-t{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bd)}

/* 증빙파일 */
.fi{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px}
.fic{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700}
.fic-pdf{background:#FFEBEE;color:#C62828}.fic-img{background:#E8F5E9;color:#2E7D32}.fic-etc{background:#E3F2FD;color:#0D47A1}
.fn{flex:1;min-width:0}
.fn-n{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fn-s{font-size:11px;color:var(--text3)}

/* 채널분석 */
.seg{display:flex;border-radius:var(--r);overflow:hidden;height:28px;margin-bottom:14px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:18px}
.cc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:10px 12px}

/* 이력 */
.hi{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.hi:last-child{border-bottom:none}

/* 토스트/로딩 */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.t-success{background:#1B5E20;color:#fff}.t-error{background:#B71C1C;color:#fff}.t-info{background:#0D47A1;color:#fff}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text3);gap:10px;font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<!-- 사이트 잠금 -->
<div id="site-lock">
  <div class="lock-box">
    <div class="lock-logo">전표 통합 관리 시스템</div>
    <div class="lock-sub">카드전표 + 매입전표 · 채널별 분석</div>
    <div style="margin-bottom:1.2rem;padding:10px 14px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--text2)">사내 전용 시스템입니다. 접속 암호를 입력해주세요.</div>
    <div class="fg"><label class="fl" style="text-align:left">접속 암호</label>
      <input type="password" id="site-pw" placeholder="암호 입력" style="background:#fff;border:1.5px solid #ccc;color:#1a1a1a;letter-spacing:.15em">
      <div id="site-pw-err" class="lock-err">암호가 올바르지 않습니다.</div>
    </div>
    <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:4px" onclick="checkSitePw()">접속</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
<div class="layout">
  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-t">전표 통합 관리</div>
      <div class="sb-logo-s">카드 + 매입 · 채널 분석</div>
    </div>
    <div class="sb-nav">
      <div class="nav-sec">설정</div>
      <button class="nav-btn" id="nav-profile" onclick="goPage('profile')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="7.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="7.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="7.5" y="7.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        마스터 관리
      </button>
      <button class="nav-btn" id="nav-clients" onclick="goPage('clients')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 12c0-2.2 1.8-4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><rect x="8" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 9v2M9.5 10h2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
        거래처 관리
      </button>
      <div class="nav-sec">데이터 입력</div>
      <button class="nav-btn on" id="nav-upload" onclick="goPage('upload')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v9M7 1L3.5 4.5M7 1L10.5 4.5M1 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        엑셀 업로드
      </button>
      <button class="nav-btn" id="nav-general" onclick="goPage('general')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 7h6M7 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        일반전표 입력
      </button>
      <button class="nav-btn" id="nav-trade" onclick="goPage('trade')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4h12M1 8h12M4 1v12M10 1v12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        매입매출전표 입력
      </button>
      <div class="nav-sec">조회 / 분석</div>
      <button class="nav-btn" id="nav-list" onclick="goPage('list')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1.5" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 5.5h6M4 8.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        전표 조회 <span class="nb" id="pb" style="display:none">!</span>
      </button>
      <button class="nav-btn" id="nav-channel" onclick="goPage('channel')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5V7l3.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        채널별 분석
      </button>
      <button class="nav-btn" id="nav-summary" onclick="goPage('summary')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 12V6l3-3 4 4 4-4v10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        기간별 요약
      </button>
    </div>
    <div class="sb-bottom">
      <button class="mgmt-btn" id="mgmt-btn" onclick="handleMgmtClick()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="5.5" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 5.5V4A3 3 0 0 1 9.5 4v1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="mgmt-txt">경영지원팀 로그인</span>
      </button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-t" id="pg-title">엑셀 업로드</div>
        <div class="topbar-s" id="pg-sub">카드사 내역 파일을 업로드하세요</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportExcel()" id="excel-btn" style="display:none">엑셀 다운로드</button>
        <button class="btn btn-sm" onclick="exportCSV()">CSV 내보내기</button>
      </div>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spin"></div>로딩 중...</div></div>
  </div>
</div>
</div>

<!-- 전표 저장 확인 모달 -->
<div class="ov" id="confirm-ov" style="display:none" onclick="if(event.target===this)closeConfirm()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mh"><div class="mh-t" id="confirm-title">전표 미리보기</div><button class="mc" onclick="closeConfirm()">×</button></div>
    <div class="mb" id="confirm-body"></div>
    <div class="mf">
      <button class="btn" onclick="closeConfirm()">취소</button>
      <button class="btn btn-p" id="confirm-save-btn" onclick="doSaveEntry()">전표 저장</button>
    </div>
  </div>
</div>

<!-- 전표 상세/수정 모달 -->
<div class="ov" id="dov" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mh">
      <div class="mh-t" id="d-title">전표 상세</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm btn-blue" id="edit-btn" onclick="toggleEdit()">수정</button>
        <button class="mc" onclick="closeDetail()">×</button>
      </div>
    </div>
    <div class="mb" id="d-body"></div>
    <div class="mf">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteVoucher()" style="margin-right:auto">전표 삭제</button>
      <button class="btn" onclick="closeDetail()">닫기</button>
      <button class="btn btn-p" id="save-btn" style="display:none" onclick="saveDetail()">저장</button>
    </div>
  </div>
</div>

<!-- 경영지원팀 비번 모달 -->
<div class="ov" id="pwov" style="display:none" onclick="if(event.target===this)closePw()">
  <div class="modal modal-sm" onclick="event.stopPropagation()">
    <div class="mh"><div class="mh-t">경영지원팀 로그인</div><button class="mc" onclick="closePw()">×</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">비밀번호</label>
        <input type="password" id="pw-inp" placeholder="경영지원팀 비밀번호" onkeydown="if(event.key==='Enter')submitPw()">
        <div id="pw-err" style="font-size:12px;color:var(--red);margin-top:4px;display:none">비밀번호가 올바르지 않습니다.</div>
      </div>

async function getNextVoucherNo(date, type){
  // type: 'general' (00001~49999) or 'trade' (50001~99999)
  const startSeq = type==='general' ? 1 : 50001;
  try{
    // 1) 현재 카운터 조회
    const{data:cnt,error:e1}=await sb.from('voucher_counter')
      .select('id,last_seq').eq('vdate',date).eq('vtype',type).maybeSingle();
    let seq;
    if(!cnt){
      // 해당 날짜 첫 번째 전표 → startSeq 부터 시작
      seq = startSeq;
      const{error:e2}=await sb.from('voucher_counter')
        .insert({vdate:date,vtype:type,last_seq:seq});
      if(e2){
        // 충돌(동시 insert) 시 다시 조회
        const{data:cnt2}=await sb.from('voucher_counter')
          .select('id,last_seq').eq('vdate',date).eq('vtype',type).single();
        seq = (cnt2?.last_seq||startSeq-1)+1;
        await sb.from('voucher_counter').update({last_seq:seq}).eq('vdate',date).eq('vtype',type);
      }
    } else {
      seq = cnt.last_seq + 1;
      await sb.from('voucher_counter').update({last_seq:seq}).eq('vdate',date).eq('vtype',type);
    }
    // 일반전표: 5자리 (00001~49999), 매입매출: 5자리 (50001~99999)
    const seqStr = String(seq).padStart(5,'0');
    return `${date}-${seqStr}`;
  }catch(e){
    // 폴백: 타임스탬프 기반
    const base = type==='general' ? 1 : 50001;
    const rand = base + Math.floor(Math.random()*100);
    return `${date}-${String(rand).padStart(5,'0')}`;
  }
}

function makeAcInput(id, list, placeholder, onSelect){
  return `<div class="ac-wrap">
    <input type="text" id="${id}" placeholder="${placeholder}" autocomplete="off"
      oninput="showAc('${id}',${JSON.stringify(list).replace(/"/g,"'")})"
      onblur="setTimeout(()=>hideAc('${id}'),200)"
      onkeydown="acKeydown(event,'${id}')">
    <div class="ac-list" id="ac-${id}"></div>
  </div>`;
}
function showAllAc(id, list){
  // 포커스 시 전체 목록 표시 (입력값 없어도)
  const inp=document.getElementById(id);
  const ac=document.getElementById('ac-'+id);
  if(!inp||!ac)return;
  const q=inp.value.toLowerCase();
  const matches=q ? list.filter(x=>x.toLowerCase().includes(q)) : list;
  if(!matches.length){ac.style.display='none';return;}
  ac.innerHTML=matches.map(m=>`<div class="ac-item" onmousedown="selectAc('${id}','${m.replace(/'/g,"\'")}')">${m}</div>`).join('');
  ac.style.display='block';
}
function _hlMatch(text, q){
  // 중간 글자 매칭 + 파란색 강조
  if(!q) return text;
  const lo = text.toLowerCase();
  const qi = lo.indexOf(q.toLowerCase());
  if(qi < 0) return text;
  return text.slice(0,qi)
    + '<span style="color:var(--blue);font-weight:700;background:#e8f4ff;border-radius:2px;padding:0 1px">'
    + text.slice(qi, qi+q.length)
    + '</span>'
    + text.slice(qi+q.length);
}
function showAc(id, list){
  const inp=document.getElementById(id);
  const ac=document.getElementById('ac-'+id);
  if(!inp||!ac)return;
  const q=inp.value.toLowerCase().trim();
  if(!q){ac.style.display='none';return;}
  const matches=list.filter(x=>x.toLowerCase().includes(q)).slice(0,30);
  if(!matches.length){ac.style.display='none';return;}
  ac.innerHTML=matches.map(m=>`<div class="ac-item" onmousedown="selectAc('${id}','${m.replace(/'/g,"\\'")}');event.preventDefault()">${_hlMatch(m,q)}</div>`).join('');
  ac.style.display='block';
}
function hideAc(id){ const ac=document.getElementById('ac-'+id); if(ac)ac.style.display='none'; }
function selectAc(id, val){
  const inp=document.getElementById(id); if(inp)inp.value=val;
  hideAc(id);
  // 분개 행 자동채움 트리거
  if(id==='e-memo') fillMemoToRows();
}
function acKeydown(e,id){
  const ac=document.getElementById('ac-'+id); if(!ac||ac.style.display==='none')return;
  const items=ac.querySelectorAll('.ac-item');
  const sel=ac.querySelector('.selected');
  if(e.key==='ArrowDown'){const next=sel?sel.nextSibling:items[0];if(sel)sel.classList.remove('selected');if(next)next.classList.add('selected');e.preventDefault();}
  else if(e.key==='ArrowUp'){const prev=sel?sel.previousSibling:items[items.length-1];if(sel)sel.classList.remove('selected');if(prev)prev.classList.add('selected');e.preventDefault();}
  else if(e.key==='Enter'){if(sel){const inp=document.getElementById(id);if(inp)inp.value=sel.textContent.trim();hideAc(id);if(id==='e-memo')fillMemoToRows();}}
  else if(e.key==='Escape')hideAc(id);
}

function setQ(t){ const n=new Date(),y=n.getFullYear(),m=n.getMonth();let f,e; if(t==='jan'){f=`${y}-01-01`;e=`${y}-01-31`;}else if(t==='feb'){f=`${y}-02-01`;e=new Date(y,2,0).toISOString().slice(0,10);}else if(t==='q1'){f=`${y}-01-01`;e=`${y}-03-31`;}else if(t==='q2'){f=`${y}-04-01`;e=`${y}-06-30`;}else if(t==='last'){f=`${y}-${String(m).padStart(2,'0')}-01`;e=new Date(y,m,0).toISOString().slice(0,10);}else{f=`${y}-${String(m+1).padStart(2,'0')}-01`;e=new Date(y,m+1,0).toISOString().slice(0,10);} G.uf=f;G.ut=e; const fi=document.getElementById('uf'),ti=document.getElementById('ut'); if(fi)fi.value=f;if(ti)ti.value=e; }

function handleFile(file){
  if(!file)return;
  const fb=document.getElementById('ufb'); if(fb){fb.style.display='block';fb.textContent=`읽는 중: ${file.name}`;}
  const reader=new FileReader();
  reader.onload=ev=>{ try{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const type=document.getElementById('up-type')?.value||'card';
    const team=document.getElementById('up-team')?.value||'미지정';
    const from=document.getElementById('uf')?.value||G.uf;
    const to=document.getElementById('ut')?.value||G.ut;
    const period=`${from}~${to}`;
    const rows=data.slice(4).filter(r=>r.some(c=>c!==''&&c!=null));
    G.pend=[];
    if(type==='card'){ rows.forEach(r=>{ const amt=pn(r[9]);if(!amt)return; G.pend.push({id:uid(),전표유형:'카드전표',전표일자:fd(r[0]),청구일자:fd(r[1]),카드사:cl(r[2]),카드번호:cl(r[3]),거래처명:cl(r[4]),사업자번호:cl(r[5]),계정과목:cl(r[6]),공급가액:pn(r[7]),부가세:pn(r[8]),합계금액:amt,전표번호:cl(r[10]),전표입력유형:'카드전표',적요:cl(r[12]),담당자:cl(r[13]),팀명:team,채널:'',업로드팀:team,업로드기간:period}); }); }
    else{ rows.forEach(r=>{ const amt=pn(r[8]);if(!amt)return; G.pend.push({id:uid(),전표유형:'매입전표',전표일자:fd(r[0]),청구일자:fd(r[0]),카드사:'',카드번호:'',거래처명:cl(r[1]),사업자번호:cl(r[2]),계정과목:cl(r[4]),공급가액:pn(r[6]),부가세:pn(r[7]),합계금액:amt,전표번호:cl(r[12]),전표입력유형:'매입매출전표',적요:cl(r[13]),담당자:cl(r[14]),팀명:team,채널:cl(r[17])||'',업로드팀:team,업로드기간:period,차변계정:cl(r[4]),대변계정:cl(r[5]),적격증빙:cl(r[11]),진행상황:cl(r[15])}); }); }
    if(fb)fb.textContent=`✓ ${file.name} — ${G.pend.length}건 인식됨`;
    renderUpload();
  }catch(err){ if(fb){fb.style.display='block';fb.textContent='오류: '+err.message;} } };
  reader.readAsArrayBuffer(file);
}
async function confirmUpload(){
  if(!G.pend.length)return;
  const btn=document.querySelector('[onclick="confirmUpload()"]');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  try{
    const{error}=await sb.from('vouchers').upsert(G.pend); if(error)throw error;
    await sb.from('upload_history').insert({team:G.pend[0]?.업로드팀||'미지정',period:G.pend[0]?.업로드기간||'',type:G.pend[0]?.전표유형||'카드전표',cnt:G.pend.length});
    toast(`${G.pend.length}건 등록됐습니다.`,'success'); G.pend=[]; renderUpload();
  }catch(e){ toast('저장 실패: '+e.message,'error'); if(btn){btn.disabled=false;btn.textContent=`등록 (${G.pend.length}건)`;} }
}

function onPartnerFocus(){
  const val = document.getElementById('e-partner')?.value||'';
  const names = getClientNamesWithBiz();
  const ac = document.getElementById('ac-e-partner');

  const list = val
    ? names.filter(x=>x.name.toLowerCase().includes(val.toLowerCase())).slice(0,30)

  ac.innerHTML = list.map(m=>`

function selectPartner(name, bizNo){
  const nameEl = document.getElementById('e-partner');
  const bizEl  = document.getElementById('e-bizno');
  if(nameEl) nameEl.value = name;
  if(bizEl && bizNo) bizEl.value = bizNo;  // 사업자번호 자동 반영
  hideAc('e-partner');
  fillPartnerToRows(name);
}
function getClientNamesWithBiz(){
  // 일반 거래처에서 name + biz_no 반환
  if(G.clients.일반.length > 0){
    return G.clients.일반
      .filter(r=>r.use_yn !== 'X')
      .map(r=>({name: r.name, biz_no: r.biz_no||''}));
  }
  // 로드 안 됐으면 빈 배열
  return [];

function getClientNames(){
  return getClientNamesWithBiz().map(r=>r.name);

function fillPartnerToRows(val){
  G.eRows.forEach(r=>{ if(!r.partner||r.partner==='') r.partner=val; });
  const tb=document.getElementById('jt-body'); if(tb)tb.innerHTML=buildEntryRows();
}

function applyTax(){
  const supply=pn(document.getElementById('e-supply')?.value||0);
  const taxType=document.getElementById('e-taxtype')?.value||'과세';
  const vat=taxType==='과세'?Math.round(supply*0.1):0;
  const vatEl=document.getElementById('e-vat'); if(vatEl)vatEl.value=vat;
  const totalEl=document.getElementById('e-total-amt'); if(totalEl)totalEl.value=supply+vat;
  const partner=document.getElementById('e-partner')?.value||'';
  const memo=document.getElementById('e-memo')?.value||'';
  // 분개 자동 구성
  if(supply>0){
    const mainAcct=G.eRows[0]?.acct||'상품';
    G.eRows=[
      {id:uid(),gubun:'차변',acct:mainAcct,partner,memo,amt:supply,vat:vat>0?vat:0},
    ];
    if(vat>0) G.eRows.push({id:uid(),gubun:'차변',acct:'부가세대급금',partner,memo,amt:0,vat:0});
    G.eRows.push({id:uid(),gubun:'대변',acct:'미지급금',partner,memo,amt:supply+vat,vat:0});
    const tb=document.getElementById('jt-body'); if(tb)tb.innerHTML=buildEntryRows();
  }
  recalcEntry();
}

function toggleEmpDate(){ const t=document.getElementById('e-emp-type')?.value; const el=document.getElementById('e-emp-in'); if(el)el.style.display=t==='date'?'block':'none'; }
function toggleEmpOutDate(){ const t=document.getElementById('e-emp-out-type')?.value; const el=document.getElementById('e-emp-out'); if(el)el.style.display=t==='date'?'block':'none'; }

function recalcEntry(){
  const debit=G.eRows.filter(r=>r.gubun==='차변').reduce((s,r)=>s+pn(r.amt)+pn(r.vat),0);
  const credit=G.eRows.filter(r=>r.gubun==='대변').reduce((s,r)=>s+pn(r.amt)+pn(r.vat),0);
  const total=G.eRows.reduce((s,r)=>s+pn(r.amt),0);
  const bal=document.getElementById('entry-balance');
  const st=document.getElementById('jt-sum-total');
  if(st)st.textContent=fmt(total)+'원';
  if(bal){
    const diff=debit-credit;
    bal.textContent=diff===0?'✓ 차대변 일치':`⚠ 불일치: ${fmt(Math.abs(diff))}원`;
    bal.style.color=diff===0?'var(--grn)':'var(--red)';
  }
  // 합계금액 업데이트
  const totalAmtEl=document.getElementById('e-total-amt');
  if(totalAmtEl&&G.entryPage==='general') totalAmtEl; // general은 분개에서만
}

function handleEvidDrop(fileList){

  const existing = window._evidFiles || [];

async function doSaveEntry(){
  const btn=document.getElementById('confirm-save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const p=G.ePending;
  if(!p){closeConfirm();return;}
  try{
    const vno=await getNextVoucherNo(p.date, G.entryPage==='trade'?'trade':'general');
    const mainAcct=G.eRows.find(r=>r.gubun==='차변')?.acct||'';
    const voucher={
      id:uid(),
      전표유형:'직접입력',
      전표입력유형:G.entryPage==='trade'?'매입매출전표':'일반전표',
      전표번호:vno,
      전표일자:p.date,
      청구일자:p.date,
      거래처명:p.partner,
      사업자번호:p.bizno,
      계정과목:mainAcct,
      공급가액:p.supply,
      부가세:p.vat,
      합계금액:p.total,
      적요:p.memo,
      담당자:p.person,
      팀명:p.team,
      채널:p.channel,
      업로드팀:p.team,
      업로드기간:p.date.slice(0,10),
      과세유형:document.getElementById('e-taxtype')?.value||'과세',
      적격증빙:p.evid,
      증빙번호:p.evno,
      분개내역:JSON.stringify(G.eRows),
      emp_입고일자:p.empIn,
      emp_반출일자:p.empOut,
    };
    const{error}=await sb.from('vouchers').insert(voucher);
    if(error)throw error;

    // 증빙파일 업로드
    const saveFiles = window._evidFiles || (document.getElementById('evid-file')?.files ? Array.from(document.getElementById('evid-file').files) : []);
    if(saveFiles.length>0){
      for(const f of saveFiles){
        const path=`${voucher.id}/${Date.now()}_${f.name}`;
        await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
        await sb.from('voucher_files').insert({voucher_id:voucher.id,file_name:f.name,file_path:path,file_type:f.type,file_size:f.size,uploaded_by:p.person||'직접입력'});
      }
    }

    closeConfirm();
    window._evidFiles = [];  // 증빙파일 초기화
    toast(`전표번호 ${vno} 저장 완료!`,'success');
    initEntryRows();
    G.ePending=null;
    await loadVS();
    renderEntryForm(G.entryPage);
  }catch(e){
    toast('저장 실패: '+e.message,'error');
    btn.disabled=false; btn.textContent='전표 저장';
  }
}

function buildRows(recs){
  if(!recs.length)return'<tr><td colspan="11" style="text-align:center;padding:2.5rem;color:var(--text3)">전표가 없습니다.</td></tr>';
  return recs.map(r=>`<tr class="vrow${!r.채널?' no-ch':''}" onclick="openDetail('${r.id}')">
    <td style="font-family:monospace;font-size:11px;${!r.적격증빙&&r.전표유형==='직접입력'?'color:var(--red)':''}">${r.전표번호||'-'}</td>
    <td><span class="badge ${r.전표유형==='카드전표'?'b-card':r.전표유형==='매입전표'?'b-buy':'b-manual'}">${r.전표입력유형||r.전표유형}</span></td>
    <td style="white-space:nowrap;font-size:11px">${r.전표일자||'-'}</td>
    <td style="font-size:11px">${r.팀명||'-'}</td>
    <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.거래처명||'-'}</td>
    <td style="font-size:11px;color:var(--text2)">${r.계정과목||'-'}</td>
    <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(r.합계금액)}원</td>
    <td style="font-size:11px">${r.담당자||'-'}</td>
    <td>${chB(r.채널)}</td>
    <td><button class="btn btn-sm" style="${!r.적격증빙?'color:var(--red);border-color:var(--red)':''}" onclick="event.stopPropagation();openFM('${r.id}','${(r.거래처명||'').replace(/'/g,"\\'")}')">파일</button></td>
    <td style="font-size:11px;color:var(--text2)">${r.emp_입고일자||'-'}</td>
  </tr>`).join('');
}

function applyF(){
  const p=document.getElementById('fl-p')?.value||'';
  const t=document.getElementById('fl-t')?.value||'';
  const tm=document.getElementById('fl-tm')?.value||'';
  const ch=document.getElementById('fl-ch')?.value||'';
  const ac=document.getElementById('fl-ac')?.value||'';
  const pt=document.getElementById('fl-pt')?.value||'';
  const q=(document.getElementById('fl-q')?.value||'').toLowerCase();
  const fl=G.vs.filter(r=>{
    if(p&&r.업로드기간!==p)return false;
    if(t&&r.전표유형!==t)return false;
    if(tm&&r.팀명!==tm)return false;
    if(ch==='__none'&&r.채널)return false;
    if(ch&&ch!=='__none'&&r.채널!==ch)return false;
    if(ac&&r.계정과목!==ac)return false;
    if(pt&&r.거래처명!==pt)return false;
    if(q&&!((r.거래처명||'').toLowerCase().includes(q)||(r.적요||'').toLowerCase().includes(q)))return false;
    return true;
  });
  const tb=document.getElementById('vtb'); if(tb)tb.innerHTML=buildRows(fl);
  const cnt=document.getElementById('vcnt'); if(cnt)cnt.textContent=`${fl.length}건 · ${fmt(fl.reduce((s,r)=>s+Number(r.합계금액||0),0))}원`;
}

function exportExcel(){
  if(!G.vs.length){toast('데이터가 없습니다.','info');return;}
  const headers=['전표번호','전표유형','전표입력유형','전표일자','청구일자','팀명','채널','거래처명','사업자번호','계정과목','공급가액','부가세','합계금액','적요','담당자','증빙번호','emp_입고일자','emp_반출일자'];
  const rows=G.vs.map(r=>headers.map(h=>r[h]??''));
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'전표목록');

// ── 소속팀 관리 ──
function addTeam(){
  const val=document.getElementById('new-team-inp')?.value?.trim();
  if(!val){toast('팀명을 입력해주세요.','info');return;}
  if(G.masterTeams.includes(val)){toast('이미 존재하는 팀명입니다.','info');return;}
  G.masterTeams.push(val);
  saveMaster();
  toast(`'${val}' 팀이 추가됐습니다.`,'success');
  renderProfile();
}

function deleteTeam(idx){
  const name=G.masterTeams[idx];
  const cnt=G.vs.filter(v=>v.팀명===name).length;
  if(!confirm(`'${name}' 팀을 삭제하시겠습니까?\n※ 기존 전표 ${cnt}건의 팀명은 변경되지 않습니다.`))return;
  G.masterTeams.splice(idx,1);
  saveMaster();
  toast(`'${name}' 팀이 삭제됐습니다.`,'info');
  renderProfile();
}

let _renameTeamIdx = -1;
function startRenameTeam(idx){
  _renameTeamIdx=idx;
  const box=document.getElementById('team-rename-box');
  if(box)box.style.display='block';
  const oldEl=document.getElementById('team-old-val');
  const newEl=document.getElementById('team-new-val');
  if(oldEl)oldEl.value=G.masterTeams[idx];
  if(newEl){newEl.value='';newEl.focus();}
}

async function confirmRenameTeam(){
  const oldVal=document.getElementById('team-old-val')?.value||'';
  const newVal=document.getElementById('team-new-val')?.value?.trim()||'';
  if(!newVal){toast('새 팀명을 입력해주세요.','info');return;}
  if(oldVal===newVal){cancelRename('team');return;}
  if(G.masterTeams.includes(newVal)){toast('이미 존재하는 팀명입니다.','info');return;}
  const btn=document.querySelector('[onclick="confirmRenameTeam()"]');
  if(btn){btn.disabled=true;btn.textContent='적용 중...';}
  try{
    // Supabase에서 일괄 업데이트
    const{error}=await sb.from('vouchers').update({팀명:newVal}).eq('팀명',oldVal);
    if(error)throw error;
    const cnt=G.vs.filter(v=>v.팀명===oldVal).length;
    // 로컬 데이터도 업데이트
    G.vs.forEach(v=>{if(v.팀명===oldVal)v.팀명=newVal;});
    // masterTeams 업데이트
    const idx=G.masterTeams.indexOf(oldVal);
    if(idx>=0)G.masterTeams[idx]=newVal;
    saveMaster();
    // 이력 추가
    G.masterHistory.push({time:new Date().toLocaleString('ko-KR'),type:'team',oldVal,newVal,count:cnt});
    toast(`팀명 변경 완료: '${oldVal}' → '${newVal}' (${cnt}건 반영)`,'success');
    cancelRename('team');
    renderProfile();
  }catch(e){toast('변경 실패: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent='일괄 변경 적용';}}
}

// ── 채널 관리 ──
async function addChFromMaster(){
  const val=document.getElementById('new-ch-inp2')?.value?.trim();
  if(!val){toast('채널명을 입력해주세요.','info');return;}
  if(G.channels.includes(val)){toast('이미 존재하는 채널명입니다.','info');return;}
  try{
    await sb.from('channel_list').insert({channel_name:val,is_default:false});
    G.channels.push(val);
    toast(`'${val}' 채널이 추가됐습니다.`,'success');
    renderProfile();
  }catch(e){toast('추가 실패: '+e.message,'error');}
}

async function deleteCh(idx){
  const name=G.channels[idx];
  const cnt=G.vs.filter(v=>v.채널===name).length;
  if(!confirm(`'${name}' 채널을 삭제하시겠습니까?\n※ 기존 전표 ${cnt}건의 채널은 변경되지 않습니다.`))return;
  try{
    await sb.from('channel_list').delete().eq('channel_name',name);
    G.channels.splice(idx,1);
    toast(`'${name}' 채널이 삭제됐습니다.`,'info');

}

let _renameChIdx = -1;
function startRenameCh(idx){
  _renameChIdx=idx;
  const box=document.getElementById('ch-rename-box');
  if(box)box.style.display='block';
  const oldEl=document.getElementById('ch-old-val');
  const newEl=document.getElementById('ch-new-val');
  if(oldEl)oldEl.value=G.channels[idx];
  if(newEl){newEl.value='';newEl.focus();}
}

async function confirmRenameCh(){
  const oldVal=document.getElementById('ch-old-val')?.value||'';
  const newVal=document.getElementById('ch-new-val')?.value?.trim()||'';
  if(!newVal){toast('새 채널명을 입력해주세요.','info');return;}
  if(oldVal===newVal){cancelRename('ch');return;}
  if(G.channels.includes(newVal)){toast('이미 존재하는 채널명입니다.','info');return;}
  const btn=document.querySelector('[onclick="confirmRenameCh()"]');
  if(btn){btn.disabled=true;btn.textContent='적용 중...';}
  try{
    // 1) 전표 일괄 업데이트
    const{error:e1}=await sb.from('vouchers').update({채널:newVal}).eq('채널',oldVal);
    if(e1)throw e1;
    // 2) channel_list 업데이트
    const{error:e2}=await sb.from('channel_list').update({channel_name:newVal}).eq('channel_name',oldVal);
    if(e2)throw e2;
    const cnt=G.vs.filter(v=>v.채널===oldVal).length;
    // 3) 로컬 데이터 업데이트
    G.vs.forEach(v=>{if(v.채널===oldVal)v.채널=newVal;});
    const cidx=G.channels.indexOf(oldVal);
    if(cidx>=0)G.channels[cidx]=newVal;
    // 4) CLC 컬러맵 업데이트
    if(CLC[oldVal]){CLC[newVal]=CLC[oldVal];delete CLC[oldVal];}
    // 5) 이력 추가
    G.masterHistory.push({time:new Date().toLocaleString('ko-KR'),type:'ch',oldVal,newVal,count:cnt});
    toast(`채널 변경 완료: '${oldVal}' → '${newVal}' (${cnt}건 반영)`,'success');
    cancelRename('ch');
    renderProfile();
  }catch(e){toast('변경 실패: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent='일괄 변경 적용';}}
}

function cancelRename(type){
  const box=document.getElementById(type+'-rename-box');
  if(box)box.style.display='none';
}

    <button onclick="_setClientTab('${t}')" style="padding:8px 18px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:${_clientTab===t?'600':'400'};

      ${t} 거래처 <span style="font-size:11px;color:var(--text3);font-weight:400">(${counts[i]})</span>
    </button>`).join('');

  // 현재 탭 데이터
  const rows = _getFilteredClients();

  // 컬럼 정의
  const cols = _clientCols(_clientTab);

  // 테이블 행
  const tableRows = rows.slice(0, 200).map(r => {

    if(isEditing) return _buildEditRow(r, cols);
    return _buildViewRow(r, cols);
  }).join('');

  const moreMsg = rows.length > 200
    ? `<tr><td colspan="${cols.length+1}" style="text-align:center;padding:10px;color:var(--text3);font-size:12px">검색으로 좁혀주세요 — 전체 ${rows.length}건 중 200건 표시</td></tr>` : '';

  document.getElementById('content').innerHTML = `

    <!-- 탭 -->
    <div style="display:flex;border-bottom:0.5px solid var(--bd);padding:0 4px;background:var(--bg)">
      ${tabHtml}
    </div>

    <!-- 툴바 -->
    <div style="display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--bd);flex-wrap:wrap">
      <input type="text" placeholder="거래처명·코드·사업자번호 검색..." value="${_clientSearch}"
        oninput="_clientSearch=this.value;_debounceRender()" style="width:240px;font-size:12px">
      <span style="font-size:12px;color:var(--text3)">${rows.length}건</span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-grn btn-sm" onclick="_startAddClient()">+ 거래처 추가</button>
        <button class="btn btn-sm" onclick="_reloadClients()">새로고침</button>
      </div>
    </div>

    <!-- 추가 폼 -->
    <div id="client-add-form" style="display:none;padding:14px 16px;background:var(--bbg);border-bottom:0.5px solid var(--bd)">
      <div style="font-size:12px;font-weight:600;color:var(--btx);margin-bottom:10px">신규 ${_clientTab} 거래처 추가</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        ${_buildAddFormInputs(_clientTab)}
        <button class="btn btn-sm btn-p" onclick="_saveNewClient()">저장</button>
        <button class="btn btn-sm" onclick="document.getElementById('client-add-form').style.display='none'">취소</button>
      </div>
    </div>

    <!-- 테이블 -->
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="background:var(--bg2)">
            ${cols.map(c=>`<th style="padding:8px 10px;font-weight:500;color:var(--text2);text-align:left;border-bottom:0.5px solid var(--bd);white-space:nowrap">${c.label}</th>`).join('')}
            <th style="padding:8px 10px;font-weight:500;color:var(--text2);text-align:center;border-bottom:0.5px solid var(--bd);width:100px">관리</th>
          </tr>
        </thead>
        <tbody>${tableRows}${moreMsg}</tbody>
      </table>
    </div>
  </div>`;
}

function _getFilteredClients(){
  const q = _clientSearch.toLowerCase().trim();
  if(!q) return G.clients[_clientTab];
  return G.clients[_clientTab].filter(r => {
    const name = (r.name||'').toLowerCase();
    const code = (r.code||'').toLowerCase();
    const biz  = (r.biz_no||r.card_no||r.acct_no||'').toLowerCase();
    return name.includes(q) || code.includes(q) || biz.includes(q);
  });
}

function _clientCols(tab){
  if(tab==='일반') return [
    {key:'code',    label:'Code',    w:'80px'},
    {key:'name',    label:'거래처명',  w:'220px'},
    {key:'biz_no',  label:'사업자번호', w:'130px'},
    {key:'rep',     label:'대표자',   w:'100px'},
    {key:'gubun',   label:'구분',    w:'70px'},
    {key:'use_yn',  label:'사용',    w:'55px'},
    {key:'memo',    label:'메모',    w:'160px'},
  ];
  if(tab==='카드') return [
    {key:'code',    label:'Code',      w:'80px'},
    {key:'name',    label:'카드(사)명',   w:'220px'},
    {key:'card_no', label:'카드번호',    w:'180px'},
    {key:'gubun',   label:'구분',      w:'70px'},
    {key:'use_yn',  label:'사용',      w:'55px'},
    {key:'memo',    label:'메모',      w:'160px'},
  ];
  return [ // 금융
    {key:'code',    label:'Code',    w:'80px'},
    {key:'name',    label:'금융기관명', w:'200px'},
    {key:'acct_no', label:'계좌번호',  w:'180px'},
    {key:'gubun',   label:'구분',    w:'70px'},
    {key:'use_yn',  label:'사용',    w:'55px'},
    {key:'memo',    label:'메모',    w:'160px'},
  ];
}

function _buildViewRow(r, cols){
  const useColor = r.use_yn==='X' ? 'color:var(--red)' : 'color:var(--grn)';
  const rowBg = r.use_yn==='X' ? 'background:#fff8f8' : '';
  return `<tr style="${rowBg};border-bottom:0.5px solid var(--bd)" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='${rowBg}'">
    ${cols.map(c => {
      if(c.key==='use_yn') return `<td style="padding:6px 10px"><span style="font-size:11px;font-weight:600;${useColor}">${r.use_yn||'O'}</span></td>`;
      if(c.key==='name')   return `<td style="padding:6px 10px;font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r[c.key]||''}">${r[c.key]||''}</td>`;
      return `<td style="padding:6px 10px;color:var(--text2);max-width:${c.w};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r[c.key]||''}</td>`;
    }).join('')}
    <td style="padding:4px 8px;text-align:center">
      <button class="btn btn-sm" onclick="_startEditClient(${r.id})" style="margin-right:3px">수정</button>
      <button class="btn btn-sm btn-danger" onclick="_deleteClient(${r.id})">삭제</button>
    </td>
  </tr>`;
}

function _buildEditRow(r, cols){
  const GUBUN_일반 = ['전체','매입','매출'];
  const GUBUN_카드 = ['매입','매출'];
  const GUBUN_금융 = ['일반','차입','투자'];
  const gubunList = _clientTab==='일반'?GUBUN_일반:_clientTab==='카드'?GUBUN_카드:GUBUN_금융;
  return `<tr style="background:var(--bbg);border-bottom:0.5px solid var(--blue)">
    ${cols.map(c => {
      const val = r[c.key]||'';
      if(c.key==='gubun') return `<td style="padding:4px 6px"><select id="ec-${c.key}" style="font-size:11px;padding:3px 5px;width:70px">${gubunList.map(g=>`<option ${val===g?'selected':''}>${g}</option>`).join('')}</select></td>`;
      if(c.key==='use_yn') return `<td style="padding:4px 6px"><select id="ec-${c.key}" style="font-size:11px;padding:3px 5px;width:55px"><option ${val==='O'?'selected':''}>O</option><option ${val==='X'?'selected':''}>X</option></select></td>`;
      return `<td style="padding:4px 6px"><input type="text" id="ec-${c.key}" value="${String(val).replace(/"/g,'&quot;')}" style="font-size:11px;padding:3px 6px;width:100%;min-width:60px"></td>`;
    }).join('')}
    <td style="padding:4px 8px;text-align:center">
      <button class="btn btn-sm btn-p" onclick="_saveEditClient(${r.id})" style="margin-right:3px">저장</button>
      <button class="btn btn-sm" onclick="_cancelEdit()">취소</button>
    </td>
  </tr>`;
}

let _renderTimer = null;
function _debounceRender(){
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(()=>{
    _renderClientsUI();
    // 검색창 포커스 복원
    setTimeout(()=>{
      const inp = document.querySelector('[oninput*="_clientSearch"]');
      if(inp){ inp.focus(); const len=inp.value.length; inp.setSelectionRange(len,len); }
    }, 10);
  }, 120);
}
function _setClientTab(tab){ _clientTab=tab; _clientEdit=null; _clientSearch=''; _renderClientsUI(); }
function _reloadClients(){ G.clientsLoaded=false; renderClients(); }
function _startAddClient(){ document.getElementById('client-add-form').style.display='block'; document.getElementById('nadd-name')?.focus(); }
function _startEditClient(id){ _clientEdit = G.clients[_clientTab].find(r=>r.id===id)||null; _renderClientsUI(); setTimeout(()=>document.getElementById('ec-name')?.focus(),50); }
function _cancelEdit(){ _clientEdit=null; _renderClientsUI(); }

function _getTableName(){ return _clientTab==='일반'?'clients_general':_clientTab==='카드'?'clients_card':'clients_finance'; }

async function _saveNewClient(){
  const name = document.getElementById('nadd-name')?.value?.trim();
  if(!name){ toast('거래처명을 입력해주세요.','info'); return; }
  const data = {
    code:   document.getElementById('nadd-code')?.value?.trim()||'',
    name,
    gubun:  document.getElementById('nadd-gubun')?.value||'전체',
    use_yn: 'O',
  };
  if(_clientTab==='일반')  { data.biz_no=document.getElementById('nadd-biz_no')?.value?.trim()||''; data.rep=document.getElementById('nadd-rep')?.value?.trim()||''; }
  if(_clientTab==='카드')  { data.card_no=document.getElementById('nadd-card_no')?.value?.trim()||''; data.gubun='매입'; }
  if(_clientTab==='금융')  { data.acct_no=document.getElementById('nadd-acct_no')?.value?.trim()||''; }
  try{
    const{data:inserted,error}=await sb.from(_getTableName()).insert(data).select().single();
    if(error)throw error;
    G.clients[_clientTab].unshift(inserted);
    toast(`'${name}' 등록 완료`,'success');
    document.getElementById('client-add-form').style.display='none';
    _renderClientsUI();
  }catch(e){ toast('저장 실패: '+e.message,'error'); }
}

async function _saveEditClient(id){
  const cols = _clientCols(_clientTab);
  const upd = {};
  cols.forEach(c=>{ const el=document.getElementById('ec-'+c.key); if(el) upd[c.key]=el.value; });
  try{
    const{error}=await sb.from(_getTableName()).update({...upd, updated_at:new Date().toISOString()}).eq('id',id);
    if(error)throw error;
    const idx=G.clients[_clientTab].findIndex(r=>r.id===id);
    if(idx>=0) G.clients[_clientTab][idx]={...G.clients[_clientTab][idx],...upd};
    toast('수정 완료','success'); _clientEdit=null; _renderClientsUI();
  }catch(e){ toast('수정 실패: '+e.message,'error'); }
}

async function _deleteClient(id){
  const r = G.clients[_clientTab].find(x=>x.id===id);
  if(!r) return;
  if(!confirm(`'${r.name}' 거래처를 삭제하시겠습니까?`)) return;
  try{
    const{error}=await sb.from(_getTableName()).delete().eq('id',id);
    if(error)throw error;
    G.clients[_clientTab]=G.clients[_clientTab].filter(x=>x.id!==id);
    toast(`'${r.name}' 삭제 완료`,'info'); _renderClientsUI();
  }catch(e){ toast('삭제 실패: '+e.message,'error'); }
}

    거래처명:document.getElementById('e-거래처명')?.value||r.거래처명,
    사업자번호:document.getElementById('e-사업자번호')?.value||r.사업자번호,
    적격증빙:document.getElementById('e-적격증빙')?.value||r.적격증빙,
    증빙번호:document.getElementById('e-증빙번호')?.value||r.증빙번호,
    공급가액:pn(document.getElementById('e-공급가액')?.value)||r.공급가액,
    부가세:pn(document.getElementById('e-부가세')?.value)||r.부가세,
    합계금액:pn(document.getElementById('e-합계금액')?.value)||r.합계금액,
    적요:document.getElementById('e-적요')?.value||r.적요,
    emp_입고일자:document.getElementById('e-emp_입고일자')?.value||r.emp_입고일자,
    emp_반출일자:document.getElementById('e-emp_반출일자')?.value||r.emp_반출일자,
  };
  if(G.mgmt){upd.팀명=document.getElementById('e-팀명')?.value||r.팀명; upd.채널=document.getElementById('e-채널')?.value||r.채널;}
  const sb2=document.getElementById('save-btn');sb2.disabled=true;sb2.textContent='저장 중...';
  try{
    const{error}=await sb.from('vouchers').update(upd).eq('id',r.id);if(error)throw error;
    const idx=G.vs.findIndex(v=>v.id===r.id);if(idx>=0)G.vs[idx]={...G.vs[idx],...upd};G.cur={...G.cur,...upd};
    toast('저장됐습니다.','success');G.edit=false;document.getElementById('edit-btn').textContent='수정';document.getElementById('edit-btn').className='btn btn-sm btn-blue';sb2.style.display='none';
    renderDetailBody(G.cur,false);if(G.page==='list')applyF();
  }catch(e){toast('저장 실패: '+e.message,'error');sb2.disabled=false;sb2.textContent='저장';}
}
async function deleteVoucher(){
  const r=G.cur; if(!r)return;
  if(!confirm(`전표번호 ${r.전표번호||r.id}\n거래처: ${r.거래처명||''}\n금액: ${fmt(r.합계금액)}원\n\n이 전표를 삭제하시겠습니까?\n삭제 후 복구가 불가능합니다.`))return;
  const btn=document.getElementById('delete-btn');
  if(btn){btn.disabled=true;btn.textContent='삭제 중...';}
  try{
    // 증빙파일도 함께 삭제
    const{data:files}=await sb.from('voucher_files').select('file_path').eq('voucher_id',r.id);
    if(files&&files.length>0){
      const paths=files.map(f=>f.file_path);
      await sb.storage.from(BUCKET).remove(paths);
      await sb.from('voucher_files').delete().eq('voucher_id',r.id);
    }
    const{error}=await sb.from('vouchers').delete().eq('id',r.id);
    if(error)throw error;
    G.vs=G.vs.filter(v=>v.id!==r.id);
    toast(`전표 삭제 완료: ${r.전표번호||r.id}`,'info');
    closeDetail();
    if(G.page==='list')renderList();
    else if(G.page==='general'||G.page==='trade')renderEntryForm(G.entryPage);
  }catch(e){toast('삭제 실패: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent='전표 삭제';}}
}
function closeDetail(){ document.getElementById('dov').style.display='none'; G.edit=false; G.cur=null; document.getElementById('edit-btn').style.display='inline-flex'; }

// ═══════════════════════════════════════════════════════
// 증빙 파일 모달
// ═══════════════════════════════════════════════════════
async function openFM(vid,mn){
  document.getElementById('fm-title').textContent=`증빙 파일 — ${mn}`;
  document.getElementById('fm-body').innerHTML='<div class="loading"><div class="spin"></div>로딩 중...</div>';
  document.getElementById('fov').style.display='flex';
  try{
    const{data:files,error}=await sb.from('voucher_files').select('*').eq('voucher_id',vid).order('created_at');
    if(error)throw error;
    const fH=files.length?files.map(f=>`<div class="fi"><div class="fic ${fe(f.file_name)}">${(f.file_name||'').split('.').pop().toUpperCase().slice(0,4)}</div><div class="fn"><div class="fn-n">${f.file_name}</div><div class="fn-s">${fs(f.file_size||0)} · ${new Date(f.created_at).toLocaleDateString('ko-KR')}</div></div><button class="btn btn-sm btn-blue" onclick="dlFile('${f.file_path}','${f.file_name}')">다운로드</button>${G.mgmt?`<button class="btn btn-sm btn-danger" onclick="delFile(${f.id},'${vid}','${mn}')">삭제</button>`:''}</div>`).join(''):'<div style="font-size:13px;color:var(--text3);text-align:center;padding:1.5rem">첨부된 파일이 없습니다.</div>';
    document.getElementById('fm-body').innerHTML=`${fH}<div style="margin-top:14px;border-top:0.5px solid var(--bd);padding-top:14px">
  <label class="fl">증빙 파일 추가</label>
  <div style="border:1.5px dashed var(--bd2);border-radius:var(--r);padding:12px 16px;cursor:pointer;transition:background .15s"
    onclick="document.getElementById('fm-file-inp-${vid}').click()"
    ondragover="event.preventDefault();this.style.background='var(--bbg)';this.style.borderColor='var(--blue)'"
    ondragleave="this.style.background='';this.style.borderColor=''"
    ondrop="event.preventDefault();this.style.background='';this.style.borderColor='';uploadFiles(event.dataTransfer.files,'${vid}','${mn}')">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v10M8 2L5 5M8 2l3 3M2 13h12" stroke="var(--text3)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-size:12px;color:var(--text2)">파일 선택 또는 드래그&드롭 (PDF, 이미지, Excel 등)</span>
      <input type="file" id="fm-file-inp-${vid}" multiple accept="image/*,.pdf,.xlsx,.xls,.docx,.doc" style="display:none" onchange="uploadFiles(this.files,'${vid}','${mn}')">
    </div>
  </div>
</div>`;
  }catch(e){document.getElementById('fm-body').innerHTML=`<div style="color:var(--red)">${e.message}</div>`;}
}
function closeFM(){ document.getElementById('fov').style.display='none'; }
async function uploadFiles(fl,vid,mn){ const files=Array.from(fl);let done=0; for(const f of files){try{const path=`${vid}/${Date.now()}_${f.name}`;const{error:ue}=await sb.storage.from(BUCKET).upload(path,f,{upsert:true});if(ue)throw ue;await sb.from('voucher_files').insert({voucher_id:vid,file_name:f.name,file_path:path,file_type:f.type,file_size:f.size,uploaded_by:'팀원'});done++;}catch(e){toast(f.name+' 실패: '+e.message,'error');}} if(done>0){toast(`${done}개 업로드됐습니다.`,'success');openFM(vid,mn);} }
async function dlFile(path,fn){try{const{data,error}=await sb.storage.from(BUCKET).download(path);if(error)throw error;const url=URL.createObjectURL(data);const a=document.createElement('a');a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);}catch(e){toast('다운로드 실패','error');}}
async function delFile(fid,vid,mn){if(!confirm('삭제하시겠습니까?'))return;try{const{data:fd}=await sb.from('voucher_files').select('file_path').eq('id',fid).single();if(fd?.file_path)await sb.storage.from(BUCKET).remove([fd.file_path]);await sb.from('voucher_files').delete().eq('id',fid);toast('삭제됐습니다.','info');openFM(vid,mn);}catch(e){toast('삭제 실패','error');}}

// ═══════════════════════════════════════════════════════
// 채널별 분석
// ═══════════════════════════════════════════════════════
async function renderChannel(){
  await loadVS();
  const fl=G.vs; if(!fl.length){document.getElementById('content').innerHTML='<div class="empty">데이터가 없습니다.</div>';return;}
  const tot=fl.reduce((s,r)=>s+Number(r.합계금액||0),0);
  const ck=v=>(!v)?'(미부여)':v;
  const allC=[...G.channels,'(미부여)'];
  const bC=allC.map(ch=>({ch,amt:fl.filter(r=>ck(r.채널)===ch).reduce((s,r)=>s+Number(r.합계금액||0),0),cnt:fl.filter(r=>ck(r.채널)===ch).length}));
  const bar=bC.filter(x=>x.amt>0).map(x=>{const p=tot?Math.round(x.amt/tot*100):0;return`<div style="width:${Math.max(p,.3)}%;background:${CLC[x.ch]||'#888'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;overflow:hidden;white-space:nowrap;padding:0 3px" title="${x.ch}: ${fmt(x.amt)}원 (${p}%)">${p>5?x.ch:''}</div>`;}).join('');
  const cards=bC.filter(x=>x.amt>0).map(x=>`<div class="cc"><div style="margin-bottom:5px">${chB(x.ch==='(미부여)'?'':x.ch)}</div><div style="font-size:14px;font-weight:700">${fmt(x.amt)}원</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${x.cnt}건 · ${tot?Math.round(x.amt/tot*100):0}%</div></div>`).join('');
  const teams=[...new Set(fl.map(r=>r.팀명||'미지정'))].sort();
  const thC=G.channels.map(c=>`<th style="text-align:right;font-size:10px">${c}</th>`).join('');
  const tRows=teams.map(tm=>{const tr=fl.filter(r=>(r.팀명||'미지정')===tm);return`<tr><td><strong>${tm}</strong></td><td style="text-align:right;font-weight:600">${fmt(tr.reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>${G.channels.map(ch=>{const v=tr.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}</tr>`;}).join('');
  const accts=[...new Set(fl.map(r=>r.계정과목||'기타'))].sort();
  const aRows=accts.map(ac=>{const ar=fl.filter(r=>(r.계정과목||'기타')===ac);return`<tr><td><strong>${ac}</strong></td><td style="text-align:right;font-weight:600">${fmt(ar.reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>${G.channels.map(ch=>{const v=ar.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}</tr>`;}).join('');
  document.getElementById('content').innerHTML=`<div class="seg">${bar}</div><div class="cg">${cards}</div><div style="height:0.5px;background:var(--bd);margin:4px 0 16px"></div><div style="font-size:14px;font-weight:600;margin-bottom:10px">팀별 × 채널 비용</div><div class="tw" style="margin-bottom:20px"><table><thead><tr><th>팀</th><th style="text-align:right">합계</th>${thC}</tr></thead><tbody>${tRows}</tbody></table></div><div style="font-size:14px;font-weight:600;margin-bottom:10px">계정과목 × 채널 비용</div><div class="tw"><table><thead><tr><th>계정과목</th><th style="text-align:right">합계</th>${thC}</tr></thead><tbody>${aRows}</tbody></table></div>`;
}

// ═══════════════════════════════════════════════════════
// 기간별 요약
// ═══════════════════════════════════════════════════════
async function renderSummary(){
  await loadVS();
  const periods=[...new Set(G.vs.map(r=>r.업로드기간||''))].filter(Boolean).sort().reverse();
  if(!periods.length){document.getElementById('content').innerHTML='<div class="empty">데이터가 없습니다.</div>';return;}
  const thC=G.channels.map(c=>`<th style="text-align:right;font-size:10px">${c}</th>`).join('');
  document.getElementById('content').innerHTML=`<div class="tw"><table><thead><tr><th>기간</th><th>팀</th><th>건수</th><th style="text-align:right">합계</th><th style="text-align:right">카드</th><th style="text-align:right">매입</th><th style="text-align:right">직접입력</th>${thC}<th style="text-align:right">미부여</th></tr></thead><tbody>${periods.map(p=>{const teams=[...new Set(G.vs.filter(r=>r.업로드기간===p).map(r=>r.팀명||'미지정'))].sort();return teams.map((tm,ti)=>{const mr=G.vs.filter(r=>r.업로드기간===p&&(r.팀명||'미지정')===tm);const tot=mr.reduce((s,r)=>s+Number(r.합계금액||0),0);const none=mr.filter(r=>!r.채널).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<tr>${ti===0?`<td rowspan="${teams.length}" style="font-weight:600;vertical-align:top;padding-top:10px;font-size:12px;white-space:nowrap">${p}</td>`:''}<td style="font-size:12px">${tm}</td><td>${mr.length}건</td><td style="text-align:right;font-weight:600">${fmt(tot)}원</td><td style="text-align:right;font-size:11px;color:var(--text2)">${fmt(mr.filter(r=>r.전표유형==='카드전표').reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td><td style="text-align:right;font-size:11px;color:var(--text2)">${fmt(mr.filter(r=>r.전표유형==='매입전표').reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td><td style="text-align:right;font-size:11px;color:var(--text2)">${fmt(mr.filter(r=>r.전표유형==='직접입력').reduce((s,r)=>s+Number(r.합계금액||0),0))}원</td>${G.channels.map(ch=>{const v=mr.filter(r=>r.채널===ch).reduce((s,r)=>s+Number(r.합계금액||0),0);return`<td style="text-align:right;font-size:11px;color:var(--text2)">${v>0?fmt(v)+'원':'-'}</td>`;}).join('')}<td style="text-align:right;font-size:11px;color:${none>0?'var(--red)':'var(--text2)'}">${none>0?fmt(none)+'원':'-'}</td></tr>`;}).join('');}).join('')}</tbody></table></div>`;
}
</script>
